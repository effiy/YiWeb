<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YiAi - 新闻聚合</title>
    <meta name="description" content="实时新闻聚合，涵盖AI技术、数据分析、代码开发、科技产品、商业资讯等领域">
    <meta name="keywords" content="新闻,AI,数据分析,代码开发,科技,商业">
    
    <!-- 预加载关键资源 -->
    <link rel="preload" href="./css/index.css" as="style">
    <link rel="preload" href="./css/layout/header.css" as="style">
    <link rel="preload" href="./css/layout/container.css" as="style">

    <link rel="preload" href="./css/components/buttons.css" as="style">
    <link rel="preload" href="./css/components/loading.css" as="style">
    <link rel="preload" href="./css/utils/animations.css" as="style">
    <link rel="preload" href="./css/pages/news.css" as="style">
    <link rel="preload" href="./css/components/news-content.css" as="style">
    <link rel="preload" href="./css/components/sidebar.css" as="style">
    <link rel="preload" href="./css/components/calendar.css" as="style">
    <link rel="preload" href="./css/components/date-navigation.css" as="style">
    <link rel="preload" href="./css/components/tag-statistics.css" as="style">
    <link rel="preconnect" href="https://api.effiy.cn">
    <link rel="dns-prefetch" href="https://api.effiy.cn">
    
    <!-- Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Vue3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- 统一样式表 - 优化后的CSS导入 -->
    <link rel="stylesheet" href="./css/index.css">
</head>
<body>
    <div id="app">
        <!-- 搜索头部组件 -->
        <search-header
            v-model:search-query="searchQuery"
            :categories="categories"
            :selected-categories="selectedCategories"
            :sidebar-collapsed="sidebarCollapsed"
            @search-keydown="handleSearchKeydown"
            @clear-search="clearSearch"
            @toggle-category="toggleCategory"
            @toggle-sidebar="toggleSidebar"
        ></search-header>
        
        <!-- 主要内容区域 -->
        <main class="main-content" role="main">
            <div class="container">
                <!-- 新闻列表组件 -->
                <news-list
                    :loading="loading"
                    :error="error"
                    :current-date-display="currentDateDisplay"
                    :search-query="searchQuery"
                    :search-results="searchResults"
                    :display-categories="displayCategories"
                    :selected-categories="selectedCategories"
                    :clicked-items="clickedItems"
                    :has-news-data="hasNewsData"
                    @load-news-data="loadNewsData"
                    @news-click="handleNewsClick"
                ></news-list>
                
                <!-- 侧边栏组件 -->
                <sidebar
                    :sidebar-collapsed="sidebarCollapsed"
                    :current-date="currentDate"
                    :current-date-display="currentDateDisplay"
                    :current-date-subtitle="currentDateSubtitle"
                    :is-today="isToday"
                    :is-future-date="isFutureDate"
                    :calendar-date="currentDate"
                    :calendar-title="calendarTitle"
                    :is-current-month="isCurrentMonth"
                    :calendar-days="calendarDays"
                    :selected-date="currentDate"
                    :tag-statistics="tagStatistics"
                    :selected-tags="selectedTags"
                    :has-news-data="hasNewsData"
                    @go-to-previous-day="goToPreviousDay"
                    @go-to-next-day="goToNextDay"
                    @go-to-today="goToToday"
                    @previous-month="previousMonth"
                    @next-month="nextMonth"
                    @select-date="selectDate"
                    @toggle-tag="toggleTag"
                ></sidebar>
            </div>
        </main>
    </div>

    <!-- 调试工具 -->
    <script src="./js/features/news/utils/debug.js"></script>
    
    <!-- 缓存管理器 -->
    <script src="./js/features/news/utils/cacheManager.js"></script>
    
    <!-- 配置管理 -->
    <script type="module" src="./js/index.js"></script>
    
    <!-- 组件管理器 -->
    <script src="./js/features/news/components/ComponentManager.js"></script>
    
    <!-- 组件文件 -->
    <script src="./js/features/news/components/Calendar.js"></script>
<script src="./js/features/news/components/TagStatistics.js"></script>
<script src="./js/features/news/components/Sidebar.js"></script>
<script src="./js/features/news/components/NewsList.js"></script>
<script src="./js/features/news/components/SearchHeader.js"></script>
    
    <!-- 模块化主应用逻辑 -->
    <script type="module" src="./js/features/news/utils/index.js"></script>
<script type="module" src="./js/features/news/api/newsApi.js"></script>
<script type="module" src="./js/features/news/store/newsStore.js"></script>
<script type="module" src="./js/features/news/hooks/useComputed.js"></script>
<script type="module" src="./js/features/news/hooks/useMethods.js"></script>
<script type="module" src="./js/features/news/hooks/useInit.js"></script>
<script type="module" src="./js/features/news/main.js"></script>
</body>
</html>
