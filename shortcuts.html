<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI智能助手，为您提供问答、数据分析和代码编写等服务">
    <meta name="keywords" content="AI, 智能助手, 数据分析, 代码编写, 生图创造">
    <meta name="theme-color" content="#4facfe">
    
    <!-- 预加载关键资源 -->
    <link rel="preload" href="./css/index.css" as="style">
    <link rel="preload" href="./css/layout/header.css" as="style">

    <link rel="preload" href="./css/components/buttons.css" as="style">
    <link rel="preload" href="./css/utils/animations.css" as="style">
    <link rel="preload" href="./css/pages/shortcuts.css" as="style">
    <link rel="preload" href="./css/components/shortcuts-grid.css" as="style">
    <link rel="preload" href="./css/components/shortcuts-item.css" as="style">
    <link rel="preload" href="./js/features/shortcuts/components/shortcuts-renderer.js" as="script" crossorigin>
    
    <!-- DNS预解析 -->
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
    
    <title>YiAi - 智能AI助手</title>
    
    <!-- 统一样式表 - 优化后的CSS导入 -->
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous">
</head>
<body>
    <!-- 搜索区域 -->
    <header class="header-row" role="banner">
        <!-- 第一行：搜索框和筛选 -->
        <div class="search-row">
            <div class="search-box" role="search">
                <div class="search-logo" aria-hidden="true">
                    <i class="fas fa-brain" aria-label="AI大脑图标"></i>
                </div>
                <div class="search-input-wrapper">
                    <textarea 
                        id="messageInput" 
                        placeholder="Vim 快捷键大全，提升您的编辑效率，掌握Vim的强大功能..." 
                        rows="1" 
                        maxlength="2000"
                        aria-label="消息输入框"
                        autocomplete="off"
                        spellcheck="false"></textarea>
                </div>
            </div>
            <div class="category-filters" role="group" aria-label="快捷键分类筛选">
                <div class="filter-buttons" id="filterButtons" role="tablist" aria-label="快捷键分类"></div>
            </div>
        </div>
    </header>
    
    <main class="main-content" role="main">
        <div class="container">
            <!-- 快捷键区域 -->
            <div class="shortcuts-content">
                <div class="shortcuts-grid" id="shortcutsGrid" role="tabpanel" aria-label="快捷键内容">
                    <!-- 快捷键内容将通过JavaScript动态生成 -->
                </div>
            </div>
        </div>
    </main>

    <!-- 加载指示器 -->
    <div id="loading-indicator" class="loading-indicator" aria-hidden="true">
        <div class="loading-spinner"></div>
    </div>

    <!-- 错误提示 -->
    <div id="error-message" class="error-container" role="alert" aria-live="assertive" hidden>
        <span class="error-icon" aria-hidden="true"><i class="fas fa-exclamation-triangle"></i></span>
        <span class="error-message-text" id="error-message-text"></span>
    </div>

    <!-- JavaScript -->
    <script type="module" src="./js/features/shortcuts/components/shortcuts-renderer.js"></script>
<script type="module" src="./js/features/shortcuts/shortcuts.js"></script>
</body>
</html>
