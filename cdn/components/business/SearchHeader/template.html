<header class="header-row" role="banner">
  <div class="header-nav">
    <button
      type="button"
      class="home-btn"
      @click="goHome"
      :title="homeButtonTitle"
      :aria-label="homeButtonTitle"
    >
      <i :class="homeIconClass" aria-hidden="true"></i>
    </button>
  </div>

  <div class="header-center">
    <div v-if="showSearch" class="search-box">
      <textarea
        v-model="searchQuery"
        @input="handleInput"
        @keydown="handleKeydown"
        @focus="handleFocus"
        @blur="handleBlur"
        @compositionstart="handleCompositionStart"
        @compositionend="handleCompositionEnd"
        :placeholder="placeholder"
        rows="1"
        maxlength="2000"
        aria-label="搜索输入框"
        autocomplete="off"
        spellcheck="false"
        ref="searchInput"
        :aria-expanded="isPanelVisible"
        aria-controls="search-panel"
        aria-activedescendant="search-panel-option-active"
      ></textarea>
      <button
        v-if="searchQuery"
        type="button"
        class="clear-btn"
        @click="clearSearch"
        aria-label="清除搜索"
      >
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
      <div
        id="search-panel"
        class="search-panel"
        :class="{ 'is-visible': isPanelVisible }"
        role="listbox"
        v-if="isPanelVisible"
        @mousedown.prevent
      >
        <ul v-if="displayItems.length" class="search-panel-list">
          <li
            v-for="(item, index) in displayItems"
            :key="item"
            class="search-panel-item"
            :class="{ 'is-active': index === activeIndex }"
            :id="index === activeIndex ? 'search-panel-option-active' : undefined"
            role="option"
            :aria-selected="index === activeIndex"
            @click="selectItem(item)"
            @mouseenter="activeIndex = index"
          >
            <span class="search-panel-text" v-html="highlightMatch(item)"></span>
            <button
              type="button"
              class="search-panel-delete"
              @click.stop="deleteItem(item)"
              :aria-label="'删除 ' + item"
              title="删除"
            >
              <i class="fas fa-times" aria-hidden="true"></i>
            </button>
          </li>
        </ul>
        <div v-else class="search-panel-empty">
          无匹配历史记录
        </div>
        <div v-if="filteredHistory.length && !searchQuery" class="search-panel-footer">
          <button
            type="button"
            class="search-panel-clear"
            @click="clearAllHistory"
          >
            清空全部
          </button>
        </div>
      </div>
    </div>
    <slot></slot>
  </div>

  <div class="header-actions">
    <button
      v-if="showNewsButton"
      type="button"
      class="header-icon-btn"
      @click="openNews"
      title="新闻"
      aria-label="新闻"
    >
      <i class="fas fa-newspaper" aria-hidden="true"></i>
    </button>

    <button
      v-if="showAuthButton"
      type="button"
      class="header-icon-btn"
      @click="openAuth"
      title="API 鉴权"
      aria-label="API 鉴权"
    >
      <i class="fas fa-key" aria-hidden="true"></i>
    </button>

    <button
      v-if="showSidebarToggle"
      type="button"
      class="header-icon-btn"
      @click="toggleSidebar"
      :title="sidebarCollapsed ? '展开侧边栏' : '收起侧边栏'"
      :aria-label="sidebarCollapsed ? '展开侧边栏' : '收起侧边栏'"
    >
      <i :class="sidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left'" aria-hidden="true"></i>
    </button>

    <button
      v-if="showClearCacheButton"
      type="button"
      class="header-icon-btn"
      @click="clearCache"
      title="清缓存并刷新"
      aria-label="清缓存并刷新"
    >
      <i class="fas fa-rotate-right" aria-hidden="true"></i>
    </button>

    <span class="env-badge" :class="envType">
      {{ envLabel }}
    </span>
  </div>
</header>
