<input
  :type="type"
  :class="computedClass"
  :value="modelValue"
  :placeholder="placeholder"
  :disabled="disabled"
  :readonly="readonly"
  :required="required"
  :name="name"
  :id="id"
  :aria-label="ariaLabel || null"
  :autocomplete="autocomplete || null"
  @input="onInput"
  @focus="onFocus"
  @blur="onBlur"
/>
