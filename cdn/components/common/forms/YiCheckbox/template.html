<label :class="wrapperClass">
  <input
    type="checkbox"
    :checked="isChecked"
    :disabled="disabled"
    :required="required"
    :value="value"
    :class="inputClass"
    :aria-label="ariaLabel || label"
    :aria-checked="isChecked ? 'true' : 'false'"
    :aria-disabled="disabled ? 'true' : null"
    @change="onChange"
  />

  <span :class="checkboxClass">
    <span v-if="isChecked" :class="iconClass">
      <slot name="icon">✓</slot>
    </span>
  </span>

  <span v-if="label || $slots.default" :class="labelClass">
    <slot>{{ label }}</slot>
  </span>
</label>
