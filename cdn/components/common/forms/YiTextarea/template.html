<textarea
  :class="computedClass"
  :value="modelValue"
  :placeholder="placeholder"
  :disabled="disabled"
  :readonly="readonly"
  :required="required"
  :name="name"
  :id="id"
  :aria-label="ariaLabel || null"
  :rows="rows"
  :style="resizeStyle"
  @input="onInput"
  @focus="onFocus"
  @blur="onBlur"
></textarea>
