<!--
  YiDialog 对话框组件模板
  author: liangliang
-->
<transition name="dialog-fade">
  <div v-if="visible" class="yi-dialog-wrapper" @click.self="handleMaskClick">
    <div :class="dialogClass" :style="dialogStyle" role="dialog" aria-modal="true">
      <!-- 关闭按钮 -->
      <button
        v-if="showClose"
        type="button"
        class="yi-dialog__close"
        @click="handleClose"
        aria-label="关闭"
      >
        ×
      </button>

      <!-- 图标 -->
      <div v-if="type !== 'info'" class="yi-dialog__icon">
        <span class="yi-dialog__icon-symbol">{{ iconClass }}</span>
      </div>

      <!-- 标题 -->
      <div v-if="title" class="yi-dialog__title">
        {{ title }}
      </div>

      <!-- 内容 -->
      <div class="yi-dialog__content">
        <slot>
          <p v-if="message">{{ message }}</p>
        </slot>
      </div>

      <!-- 底部按钮 -->
      <div class="yi-dialog__footer">
        <yi-button
          v-if="showCancel || type === 'confirm'"
          variant="secondary"
          @click="handleCancel"
          :disabled="loading"
        >
          {{ cancelText }}
        </yi-button>
        <yi-button
          :variant="type === 'error' ? 'danger' : 'primary'"
          @click="handleConfirm"
          :loading="loading"
        >
          {{ confirmText }}
        </yi-button>
      </div>
    </div>
  </div>
</transition>
