<button
  v-if="as === 'button'"
  type="button"
  :class="computedClass"
  :disabled="disabled"
  :aria-disabled="disabled ? 'true' : null"
  :title="title || null"
  :aria-label="ariaLabel || null"
  @click="onClick"
>
  <slot></slot>
  <button
    v-if="closable && !disabled"
    type="button"
    class="tag-close"
    @click="onClose"
    aria-label="关闭"
  >
    <slot name="close-icon">×</slot>
  </button>
</button>
<span v-else :class="computedClass" :title="title || null">
  <slot></slot>
  <button
    v-if="closable && !disabled"
    type="button"
    class="tag-close"
    @click="onClose"
    aria-label="关闭"
  >
    <slot name="close-icon">×</slot>
  </button>
</span>
