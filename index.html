<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能助手</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 欢迎页面 -->
        <div class="welcome-section" id="welcomeSection">
            <div class="welcome-content">
                <div class="search-logo"><i class="fas fa-brain"></i></div>
                <h1>AI 智能助手</h1>
                <p>我可以帮助您回答问题、分析数据、编写代码等</p>
                
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search search-icon"></i>
                        <textarea id="messageInput" placeholder="输入您的问题或消息..." rows="1" maxlength="2000"></textarea>
                        <button class="send-btn" id="sendBtn" disabled title="发送消息 (Enter)"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="search-tips">
                        <span class="tip">按 Enter 发送</span>
                        <span class="tip">Ctrl + K 快速聚焦</span>
                    </div>
                </div>

                <div class="quick-actions">
                    <button class="quick-action-btn" data-prompt="请介绍一下人工智能的发展历史"><i class="fas fa-history"></i><span>AI发展历史</span></button>
                    <button class="quick-action-btn" data-prompt="帮我写一个简单的Python程序"><i class="fas fa-code"></i><span>编写代码</span></button>
                    <button class="quick-action-btn" data-prompt="解释一下机器学习的基本概念"><i class="fas fa-graduation-cap"></i><span>机器学习</span></button>
                    <button class="quick-action-btn" data-prompt="帮我分析一下当前的技术趋势"><i class="fas fa-chart-line"></i><span>技术趋势</span></button>
                    <button class="quick-action-btn" data-prompt="什么是深度学习？请详细解释"><i class="fas fa-brain"></i><span>深度学习</span></button>
                    <button class="quick-action-btn" data-prompt="解释一下自然语言处理技术"><i class="fas fa-comments"></i><span>自然语言处理</span></button>
                    <button class="quick-action-btn" data-prompt="什么是计算机视觉？有哪些应用"><i class="fas fa-eye"></i><span>计算机视觉</span></button>
                    <button class="quick-action-btn" data-prompt="帮我优化一段代码的性能"><i class="fas fa-tachometer-alt"></i><span>代码优化</span></button>
                    <button class="quick-action-btn" data-prompt="解释一下神经网络的工作原理"><i class="fas fa-network-wired"></i><span>神经网络</span></button>
                    <button class="quick-action-btn" data-prompt="什么是强化学习？有哪些应用场景"><i class="fas fa-gamepad"></i><span>强化学习</span></button>
                    <button class="quick-action-btn" data-prompt="帮我写一个数据分析脚本"><i class="fas fa-chart-bar"></i><span>数据分析</span></button>
                    <button class="quick-action-btn" data-prompt="解释一下大语言模型的工作原理"><i class="fas fa-language"></i><span>大语言模型</span></button>
                    <button class="quick-action-btn" data-prompt="什么是生成式AI？有哪些应用"><i class="fas fa-magic"></i><span>生成式AI</span></button>
                    <button class="quick-action-btn" data-prompt="帮我写一个Web应用的前端代码"><i class="fas fa-laptop-code"></i><span>前端开发</span></button>
                    <button class="quick-action-btn" data-prompt="解释一下AI在医疗领域的应用"><i class="fas fa-heartbeat"></i><span>AI医疗</span></button>
                </div>
            </div>
        </div>

        <!-- 聊天页面 -->
        <div class="chat-container" id="chatContainer" style="display: none;">
            <div class="chat-messages" id="chatMessages"></div>
        </div>

        <!-- 聊天输入区域 -->
        <div class="input-section" id="inputSection" style="display: none;">
            <div class="input-container">
                <div class="input-wrapper">
                    <i class="fas fa-search input-icon"></i>
                    <input type="text" id="chatInput" placeholder="继续对话... (Ctrl+L 清空 | Ctrl+K 聚焦)" maxlength="2000">
                    <button class="send-btn" id="chatSendBtn" disabled title="发送消息"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- 加载指示器 -->
    <div class="loading-indicator" id="loadingIndicator" style="display: none;">
        <div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        <span>AI 正在思考中...</span>
    </div>

    <script src="/script.js"></script>
</body>
</html>
