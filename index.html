<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 智能助手 - 首页</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/welcome.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 欢迎页面 -->
        <div class="welcome-section" id="welcomeSection">
            <div class="welcome-content">
                <!-- 合并的logo、文案和搜索框 -->
                <div class="header-row">
                    <div class="search-logo"><i class="fas fa-brain"></i></div>
                    <div class="search-box">
                        <div class="search-input-wrapper">
                            <textarea id="messageInput" placeholder="我可以帮助您回答问题、分析数据、编写代码..." rows="1" maxlength="2000"></textarea>
                        </div>
                    </div>
                    <div class="search-tips">
                        <span class="tip" title="按回车键快速发送消息"><i class="fas fa-keyboard"></i>Enter 发送</span>
                        <span class="tip" title="按住Shift键再按回车键可以换行"><i class="fas fa-level-down-alt"></i>Shift+Enter 换行</span>
                        <span class="tip" title="快速聚焦到输入框"><i class="fas fa-search"></i>Ctrl+K 聚焦</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
    <script src="js/welcome.js"></script>
</body>
</html>
