<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI智能助手，为您提供问答、数据分析和代码编写等服务">
    <title>AI 智能助手 - 首页</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/welcome.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 欢迎页面 -->
        <div class="welcome-section" id="welcomeSection">
            <div class="welcome-content">
                <!-- 搜索区域 -->
                <div class="header-row">
                    <div class="search-logo" aria-hidden="true">
                        <i class="fas fa-brain"></i>
                    </div>
                    <div class="search-box">
                        <div class="search-input-wrapper">
                            <textarea 
                                id="messageInput" 
                                placeholder="我可以帮助您回答问题、分析数据、编写代码..." 
                                rows="1" 
                                maxlength="2000"
                                aria-label="消息输入框"></textarea>
                        </div>
                    </div>
                    <div class="search-tips">
                        <span class="tip" title="按回车键快速发送消息"><i class="fas fa-keyboard" aria-hidden="true"></i>Enter 发送</span>
                        <span class="tip" title="按住Shift键再按回车键可以换行"><i class="fas fa-level-down-alt" aria-hidden="true"></i>Shift+Enter 换行</span>
                        <span class="tip" title="快速聚焦到输入框"><i class="fas fa-search" aria-hidden="true"></i>Ctrl+K 聚焦</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
</body>
</html>
