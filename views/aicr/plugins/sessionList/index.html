<div class="session-list-container">
    <!-- 标签过滤器（参考 YiPet 项目） -->
    <div class="session-list-tags" v-if="allTags.length > 0 || tagCounts.noTagsCount > 0">
        <div class="tags-header">
            <span class="tags-title">标签筛选</span>
            <div class="tags-header-actions">
                <!-- 筛选无标签按钮 -->
                <button 
                    class="tag-filter-btn tag-filter-no-tags-btn"
                    :class="{ active: tagFilterNoTags }"
                    @click="toggleNoTags"
                    :title="tagFilterNoTags ? '取消筛选无标签会话' : '筛选没有标签的会话'"
                    aria-label="筛选无标签">
                    <span class="tag-icon-wrapper">
                        <i class="fas fa-tag"></i>
                        <i v-if="tagFilterNoTags" class="fas fa-ban tag-ban-overlay"></i>
                    </span>
                </button>
                <!-- 反向过滤按钮 -->
                <button 
                    class="tag-filter-btn tag-filter-reverse"
                    :class="{ active: tagFilterReverse }"
                    @click="toggleReverse"
                    :title="tagFilterReverse ? '取消反向过滤' : '反向过滤（排除选中标签）'"
                    aria-label="反向过滤">
                    <i class="fas fa-exchange-alt"></i>
                </button>
                <!-- 展开/折叠按钮（在头部） -->
                <button 
                    v-if="shouldShowExpandBtn"
                    class="tag-filter-btn tag-filter-expand-btn"
                    :class="{ active: tagFilterExpanded }"
                    @click="toggleExpand"
                    :title="tagFilterExpanded ? '收起标签列表' : '展开标签列表'"
                    aria-label="展开/折叠标签">
                    <i class="fas" :class="tagFilterExpanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                </button>
                <!-- 清除所有过滤按钮 -->
                <button 
                    class="tags-clear-btn"
                    :class="{ active: selectedTags.length > 0 || tagFilterNoTags || tagFilterSearchKeyword }"
                    @click="clearAllFilters"
                    :title="(selectedTags.length > 0 || tagFilterNoTags || tagFilterSearchKeyword) ? '清除所有过滤条件' : '无过滤条件'"
                    :disabled="selectedTags.length === 0 && !tagFilterNoTags && !tagFilterSearchKeyword">
                    清除
                </button>
            </div>
        </div>
        
        <!-- 标签搜索框 -->
        <div class="tag-search-container">
            <input
                type="text"
                class="tag-search-input"
                :value="tagFilterSearchKeyword"
                @input="updateTagSearch($event.target.value)"
                placeholder="搜索标签..."
                aria-label="搜索标签"
            />
            <button
                v-if="tagFilterSearchKeyword"
                class="tag-search-clear"
                @click="updateTagSearch('')"
                title="清除搜索"
                aria-label="清除搜索">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- 标签列表 -->
        <div class="tags-list">
            <!-- 没有标签按钮（不允许拖拽） -->
            <button
                v-if="tagCounts.noTagsCount > 0"
                class="tag-item tag-no-tags"
                :class="{ active: tagFilterNoTags }"
                :draggable="false"
                @click="toggleNoTags"
                :title="tagFilterNoTags ? '取消筛选无标签会话' : '筛选没有标签的会话'">
                没有标签 ({{ tagCounts.noTagsCount }})
            </button>
            
            <!-- 标签项（支持拖拽排序） -->
            <button
                v-for="tag in visibleTags"
                :key="tag"
                class="tag-item"
                :class="{ active: selectedTags.includes(tag) }"
                :draggable="true"
                :data-tag-name="tag"
                @click="toggleTag(tag)"
                @dragstart="handleDragStart($event, tag)"
                @dragend="handleDragEnd($event)"
                @dragover="handleDragOver($event)"
                @dragleave="handleDragLeave($event)"
                @drop="handleDrop($event, tag)"
                :title="selectedTags.includes(tag) ? '取消选择 | 拖拽调整顺序' : '选择标签 | 拖拽调整顺序'">
                {{ tag }} ({{ tagCounts.counts[tag] || 0 }})
            </button>
            
            <!-- 展开/折叠按钮（仅在标签列表底部显示，当有更多标签时，不允许拖拽） -->
            <button
                v-if="hasMoreTags && !tagFilterSearchKeyword"
                class="tag-item tag-expand-btn"
                :draggable="false"
                @click="toggleExpand"
                :title="tagFilterExpanded ? '收起标签' : '展开标签'">
                <i class="fas" :class="tagFilterExpanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                {{ tagFilterExpanded ? '收起' : `展开 (${filteredTags.length - visibleTags.length})` }}
            </button>
        </div>
    </div>
    
    <!-- 批量操作工具栏（仅在批量模式下显示） -->
    <div v-if="sessionBatchMode" class="session-batch-toolbar">
        <span class="batch-toolbar-selected-count" :class="{ 'has-selection': selectedSessionIds && selectedSessionIds.size > 0 }">
            已选择 {{ selectedSessionIds ? selectedSessionIds.size : 0 }} 个
        </span>
        <button 
            type="button"
            class="batch-toolbar-btn batch-toolbar-select-all"
            @click="$emit('session-batch-select-all')"
            :title="isAllSessionsSelected ? '取消全选' : '全选'"
            aria-label="全选/取消全选">
            {{ isAllSessionsSelected ? '取消全选' : '全选' }}
        </button>
        <button 
            type="button"
            class="batch-toolbar-btn batch-toolbar-delete"
            @click="$emit('session-batch-delete')"
            :disabled="!selectedSessionIds || selectedSessionIds.size === 0"
            :title="selectedSessionIds && selectedSessionIds.size > 0 ? `删除选中的 ${selectedSessionIds.size} 个会话` : '请先选择要删除的会话'"
            aria-label="批量删除会话">
            <i class="fas fa-trash" aria-hidden="true"></i>
            <span>删除</span>
        </button>
        <button 
            type="button"
            class="batch-toolbar-btn batch-toolbar-cancel"
            @click="$emit('session-batch-cancel')"
            title="退出批量选择模式"
            aria-label="退出批量选择">
            <i class="fas fa-times" aria-hidden="true"></i>
            <span>取消</span>
        </button>
    </div>
    
    <!-- 会话列表 -->
    <div class="session-list-content">
        <div v-if="loading" class="session-list-loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>加载中...</span>
        </div>
        <div v-else-if="error" class="session-list-error">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        <div v-else-if="filteredSessions.length === 0" class="session-list-empty">
            <i class="fas fa-inbox"></i>
            <span>暂无会话</span>
        </div>
        <div v-else class="session-list-items">
            <div 
                v-for="session in filteredSessions"
                :key="session.id"
                class="session-item"
                :class="{ 
                    active: selectedSessionId === session.id,
                    'batch-selected': sessionBatchMode && isSessionSelected(session.id)
                }"
                @click="handleSessionClick(session, $event)"
                @mousedown="startLongPress(session, $event)"
                @mouseup="cancelLongPress"
                @mouseleave="cancelLongPress"
                @touchstart="startLongPress(session, $event)"
                @touchend="cancelLongPress"
                @touchcancel="cancelLongPress">
                <div class="session-item-header">
                    <div class="session-item-title">
                        <!-- 批量选择复选框（仅在批量模式下显示） -->
                        <input
                            v-if="sessionBatchMode"
                            type="checkbox"
                            class="session-batch-checkbox"
                            :checked="isSessionSelected(session.id)"
                            @click.stop="handleBatchSelect(session.id, $event)"
                            :title="isSessionSelected(session.id) ? '取消选择' : '选择'"
                            aria-label="批量选择"
                        />
                        <!-- 来自news的会话显示第一个字符图标 -->
                        <div v-if="getSessionFirstChar(session)" class="session-first-char-icon" :title="'来自news'">
                            {{ getSessionFirstChar(session) }}
                        </div>
                        <i v-if="getSessionSourceIcon(session)" :class="[getSessionSourceIcon(session), 'session-source-icon', { 'session-source-icon-news': getSessionSource(session) === 'news', 'session-source-icon-file': getSessionSource(session) === 'file-tree' }]"></i>
                        <span class="session-title-text">{{ session.pageTitle || session.title || '未命名会话' }}</span>
                        <!-- 收藏按钮（批量模式下隐藏，使用 emoji 图标，在标题右边） -->
                        <button 
                            v-if="!sessionBatchMode"
                            class="session-favorite-btn"
                            :class="{ active: session.isFavorite }"
                            @click.stop="handleFavoriteClick(session)"
                            :title="session.isFavorite ? '取消收藏' : '收藏'"
                            aria-label="收藏">
                            {{ session.isFavorite ? '❤️' : '🤍' }}
                        </button>
                    </div>
                </div>
                <div class="session-item-meta">
                    <span class="session-item-tags" v-if="session.tags && session.tags.length > 0">
                        <span 
                            v-for="tag in session.tags" 
                            :key="tag"
                            class="session-tag">
                            {{ tag }}
                        </span>
                    </span>
                    <div class="session-item-footer">
                        <span class="session-item-time">{{ formatTime(session.updatedAt || session.createdAt) }}</span>
                        <!-- 操作按钮容器（底部，批量模式下隐藏） -->
                        <div 
                            v-if="!sessionBatchMode"
                            class="session-item-actions session-item-actions-footer">
                            <!-- 编辑按钮 -->
                            <button 
                                class="session-action-btn session-edit-btn"
                                @click.stop="handleEditClick(session)"
                                title="编辑标题"
                                aria-label="编辑标题">
                                <i class="fas fa-edit"></i>
                            </button>
                            <!-- 标签管理按钮 -->
                            <button 
                                class="session-action-btn session-tag-btn"
                                @click.stop="handleTagClick(session)"
                                title="管理标签"
                                aria-label="管理标签">
                                <i class="fas fa-tags"></i>
                            </button>
                            <!-- 副本按钮 -->
                            <button 
                                class="session-action-btn session-duplicate-btn"
                                @click.stop="handleDuplicateClick(session)"
                                title="创建副本"
                                aria-label="创建副本">
                                <i class="fas fa-copy"></i>
                            </button>
                            <!-- 页面上下文按钮 -->
                            <button 
                                class="session-action-btn session-context-btn"
                                @click.stop="handleContextClick(session)"
                                title="页面上下文"
                                aria-label="页面上下文">
                                <i class="fas fa-file-alt"></i>
                            </button>
                            <!-- 打开URL按钮（如果URL以https://开头） -->
                            <button 
                                v-if="session.url && session.url.startsWith('https://')"
                                class="session-action-btn session-open-url-btn"
                                @click.stop="handleOpenUrlClick(session)"
                                title="在新标签页打开"
                                aria-label="在新标签页打开">
                                <i class="fas fa-external-link-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
