<div class="session-list-container">
    <!-- 会话列表头部 -->
    <div class="session-list-header">
        <div class="session-list-title">
            <i class="fas fa-comments"></i>
            <span>会话列表</span>
        </div>
        <button 
            class="session-list-close-btn"
            @click="$emit('toggle-collapse')"
            aria-label="返回文件树视图"
            title="返回文件树视图">
            <i class="fas fa-arrow-left"></i>
        </button>
    </div>
    
    <!-- 搜索框 -->
    <div class="session-list-search">
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input 
                type="text"
                class="session-search-input"
                placeholder="搜索会话..."
                :value="searchQuery"
                @input="$emit('search-change', $event.target.value)"
            />
            <button 
                v-if="searchQuery"
                class="search-clear-btn"
                @click="$emit('search-change', '')"
                aria-label="清除搜索">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
    
    <!-- 标签过滤器 -->
    <div class="session-list-tags" v-if="allTags.length > 0">
        <div class="tags-header">
            <span class="tags-title">标签筛选</span>
            <button 
                v-if="selectedTags.length > 0"
                class="tags-clear-btn"
                @click="$emit('tag-clear')"
                title="清除标签筛选">
                清除
            </button>
        </div>
        <div class="tags-list">
            <span 
                v-for="tag in allTags" 
                :key="tag"
                class="tag-item"
                :class="{ active: selectedTags.includes(tag) }"
                @click="toggleTag(tag)">
                {{ tag }}
            </span>
        </div>
    </div>
    
    <!-- 会话列表 -->
    <div class="session-list-content">
        <div v-if="loading" class="session-list-loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>加载中...</span>
        </div>
        <div v-else-if="error" class="session-list-error">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        <div v-else-if="filteredSessions.length === 0" class="session-list-empty">
            <i class="fas fa-inbox"></i>
            <span>暂无会话</span>
        </div>
        <div v-else class="session-list-items">
            <div 
                v-for="session in filteredSessions"
                :key="session.id"
                class="session-item"
                :class="{ active: selectedSessionId === session.id }"
                @click="$emit('session-select', session)">
                <div class="session-item-header">
                    <div class="session-item-title">
                        <i v-if="session.isFavorite" class="fas fa-star favorite-icon"></i>
                        <span class="session-title-text">{{ session.pageTitle || session.title || '未命名会话' }}</span>
                    </div>
                    <div class="session-item-actions">
                        <button 
                            class="session-delete-btn"
                            @click.stop="$emit('session-delete', session.id)"
                            title="删除会话"
                            aria-label="删除会话">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="session-item-meta">
                    <span class="session-item-tags" v-if="session.tags && session.tags.length > 0">
                        <span 
                            v-for="tag in session.tags" 
                            :key="tag"
                            class="session-tag">
                            {{ tag }}
                        </span>
                    </span>
                    <span class="session-item-time">{{ formatTime(session.updatedAt || session.createdAt) }}</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 新建会话按钮 -->
    <div class="session-list-footer">
        <button 
            class="session-create-btn"
            @click="$emit('session-create')"
            title="新建会话">
            <i class="fas fa-plus"></i>
            <span>新建会话</span>
        </button>
    </div>
</div>
