<!-- 文件树组件模板 -->
<aside class="file-tree-container" :class="{ 'collapsed': collapsed }" role="navigation" aria-label="文件目录树">
    <!-- 收起按钮 -->
    <div class="file-tree-toggle" @click="$emit('toggle-collapse')" :title="collapsed ? '展开文件目录树' : '收起文件目录树'">
        <i class="fas fa-chevron-left" :class="{ 'rotated': collapsed }"></i>
    </div>
    
    <!-- 侧边栏标题容器（搜索框和工具栏） -->
    <div v-if="!collapsed" class="file-tree-header-container">
        <!-- 第一行：搜索输入框和视图切换 -->
        <div class="file-tree-search-container">
            <div class="file-tree-search-wrapper">
                <span class="file-tree-search-icon">🔍</span>
                <input
                    ref="searchInput"
                    type="text"
                    class="file-tree-search-input"
                    :value="searchQuery"
                    @input="handleSearchInput"
                    @keydown.esc="handleSearchClear"
                    placeholder="搜索文件..."
                    aria-label="搜索文件"
                />
                <button
                    v-if="searchQuery"
                    class="file-tree-search-clear"
                    @click="handleSearchClear"
                    type="button"
                    aria-label="清除搜索"
                    title="清除搜索 (ESC)"
                >
                    ✕
                </button>
                <!-- 视图切换按钮（集成在搜索框内） -->
                <div class="view-mode-toggle">
                    <button 
                        type="button"
                        class="view-mode-btn"
                        :class="{ 'active': viewMode === 'tree' }"
                        @click="handleViewModeChange('tree')"
                        :disabled="loading"
                        title="树形视图"
                        aria-label="切换到树形视图">
                        <i class="fas fa-sitemap" aria-hidden="true"></i>
                    </button>
                    <button 
                        type="button"
                        class="view-mode-btn"
                        :class="{ 'active': viewMode === 'tags' }"
                        @click="handleViewModeChange('tags')"
                        :disabled="loading"
                        title="标签视图"
                        aria-label="切换到标签视图">
                        <i class="fas fa-tags" aria-hidden="true"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 第二行：工具栏（批量选择、下载、上传） -->
        <div class="file-tree-toolbar">
            <div class="toolbar-group">
                <!-- 批量选择按钮 -->
                <button 
                    type="button"
                    class="toolbar-btn"
                    :class="{ 'active': batchMode }"
                    @click="toggleBatchMode"
                    :title="batchMode ? '退出批量选择' : '批量选择'"
                    aria-label="批量选择">
                    <i class="fas" :class="batchMode ? 'fa-check-square' : 'fa-square'" aria-hidden="true"></i>
                    <span>批量</span>
                </button>
            </div>
            <div class="toolbar-group">
                <!-- 下载按钮 -->
                <button 
                    type="button"
                    class="toolbar-btn"
                    @click="handleDownload"
                    :disabled="loading || !selectedProject"
                    :title="selectedProject ? `下载 ${selectedProject}` : '请选择项目后下载'"
                    aria-label="下载项目">
                    <i class="fas fa-download" aria-hidden="true"></i>
                    <span>下载</span>
                </button>
                <!-- 上传按钮 -->
                <button 
                    type="button"
                    class="toolbar-btn"
                    @click="triggerUpload"
                    :disabled="loading"
                    :title="selectedProject ? `上传 ${selectedProject}` : '请选择项目后上传'"
                    aria-label="上传项目">
                    <i class="fas fa-upload" aria-hidden="true"></i>
                    <span>上传</span>
                </button>
                <input
                    ref="uploadInput"
                    type="file" 
                    accept=".zip"
                    @change="handleUpload"
                    style="display:none" 
                    aria-label="上传项目ZIP">
            </div>
        </div>
    </div>
    
    <!-- 加载状态 -->
    <div v-if="loading" class="loading-container" role="status" aria-live="polite">
        <div class="loading-spinner" aria-hidden="true"></div>
        <div class="loading-text">正在加载文件树...</div>
    </div>

    <!-- 错误状态 -->
    <div v-else-if="error" class="error-container" role="alert">
        <div class="error-icon" aria-hidden="true">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="error-message">{{ error }}</div>
        <button @click="$emit('reload')" class="retry-button">
            <i class="fas fa-redo"></i>
            重新加载
        </button>
    </div>

    <!-- 文件树内容 -->
    <div v-else-if="tree.length > 0" class="file-tree-content">
        <!-- 树形视图 -->
        <ul v-if="viewMode === 'tree'" class="file-tree" role="tree">
            <template v-for="item in sortedTree" :key="item.id">
                <!-- 递归组件：文件树节点 -->
                <file-tree-node 
                    :item="item" 
                    :selected-file-id="selectedFileId"
                    :expanded-folders="expandedFolders"
                    :comments="comments"
                    :batch-mode="batchMode"
                    :selected-file-ids="selectedFileIds"
                    @file-select="$emit('file-select', $event)"
                    @folder-toggle="$emit('folder-toggle', $event)"
                    @create-folder="$emit('create-folder', $event)"
                    @create-file="$emit('create-file', $event)"
                    @rename-item="$emit('rename-item', $event)"
                    @delete-item="$emit('delete-item', $event)"
                    @create-session="$emit('create-session', $event)"
                    @batch-select-file="$emit('batch-select-file', $event)"
                ></file-tree-node>
            </template>
        </ul>
        
        <!-- 标签视图 -->
        <div v-else-if="viewMode === 'tags'" class="file-tags-view">
            <div class="tags-container">
                <div 
                    v-for="file in flattenedFiles" 
                    :key="file.id"
                    :class="['file-tag', { 
                        'selected': !batchMode && isFileSelected(file.id),
                        'batch-selected': batchMode && isFileSelected(file.id)
                    }]"
                    @click="handleTagClick(file.id)"
                    :title="`文件: ${file.name}`"
                >
                    <span class="tag-icon">{{ getFileIcon(file) }}</span>
                    <span class="tag-name">{{ file.name }}</span>
                    <span v-if="getCommentCount(file.id) > 0" class="tag-comment-count">
                        {{ getCommentCount(file.id) }}
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- 空状态 -->
    <div v-else class="empty-state" role="status">
        <div class="empty-icon" aria-hidden="true">
            <i class="fas fa-folder-open"></i>
        </div>
        <div class="empty-title">暂无文件</div>
        <div class="empty-subtitle">请检查文件目录或联系管理员</div>
    </div>
</aside>
