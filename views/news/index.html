<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI智能助手，为您提供问答、数据分析、代码编写等多种智能服务">
    <meta name="keywords" content="AI, 智能助手, 数据分析, 代码编写, 生图创造, YiWeb">
    <meta name="author" content="liangliang">
    
    <!-- DNS 预解析优化 -->
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
    
    <title>YiWeb - 智能新闻助手</title>
    
    <!-- 页面样式 -->
    <link rel="stylesheet" href="/views/news/index.css">
    <!-- 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous">

    <!-- Vue3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <!-- 顶部搜索与分类区域 -->
        <header class="header-row" role="banner">
            <section class="search-row">
                <form class="search-box" role="search" aria-label="智能助手搜索">
                    <span class="search-logo" aria-hidden="true">
                        <i class="fas fa-brain" aria-label="AI大脑图标"></i>
                    </span>
                    <div class="search-input-wrapper">
                        <label for="messageInput" class="visually-hidden">消息输入框</label>
                        <textarea 
                            id="messageInput" 
                            placeholder="我可以帮助您分析数据、编写代码、生图创造..." 
                            rows="1" 
                            maxlength="2000"
                            aria-label="消息输入框"
                            aria-describedby="category-filters"
                            autocomplete="off"
                            spellcheck="false"></textarea>
                    </div>
                </form>
                <nav class="category-filters" id="category-filters" role="toolbar" aria-label="功能分类过滤器">
                    <div class="filter-buttons">
                        <button 
                            v-for="category in categories" 
                            :key="category.key"
                            :class="['filter-btn', { active: selectedCategories.has(category.key) }]"
                            :data-category="category.key"
                            :title="category.title"
                        >
                            <i :class="category.icon"></i>
                            {{ category.title }}
                        </button>
                    </div>
                    <!-- 收缩按钮 -->
                    <button 
                        class="sidebar-toggle-btn"
                        :title="sidebarCollapsed ? '展开侧边栏' : '收缩侧边栏'"
                        :aria-label="sidebarCollapsed ? '展开侧边栏' : '收缩侧边栏'"
                        :aria-expanded="!sidebarCollapsed"
                    >
                        <i :class="sidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left'" aria-hidden="true"></i>
                        <span class="sr-only">{{ sidebarCollapsed ? '展开侧边栏' : '收缩侧边栏' }}</span>
                    </button>
                </nav>
            </section>
        </header>
        
        <main class="main-content" role="main">
            <!-- 功能卡片区域 -->
            <section class="container">
                <!-- 新闻列表组件模板 -->
                <news-list
                    :loading="loading"
                    :error="error"
                    :current-date-display="currentDateDisplay"
                    :search-query="searchQuery"
                    :search-results="searchResults"
                    :display-categories="displayCategories"
                    :selected-categories="selectedCategories"
                    :clicked-items="clickedItems"
                    :has-news-data="hasNewsData"
                    @load-news-data="loadNewsData"
                    @news-click="handleNewsClick"
                ></news-list>
                <aside class="sidebar-navigation" :class="{ collapsed: sidebarCollapsed }" role="complementary" aria-label="日期导航">
                    <calendar
                        :current-date="currentDate"
                        :current-date-display="currentDateDisplay"
                        :current-date-subtitle="currentDateSubtitle"
                        :is-today="isToday"
                        :is-future-date="isFutureDate"
                        :sidebar-collapsed="sidebarCollapsed"
                        :calendar-date="calendarDate"
                        :calendar-title="calendarTitle"
                        :is-current-month="isCurrentMonth"
                        :calendar-days="calendarDays"
                        :selected-date="selectedDate"
                        @go-to-previous-day="$emit('go-to-previous-day')"
                        @go-to-next-day="$emit('go-to-next-day')"
                        @go-to-today="$emit('go-to-today')"
                        @previous-month="$emit('previous-month')"
                        @next-month="$emit('next-month')"
                        @select-date="$emit('select-date', $event)"
                    ></calendar>
                    
                    <tag-statistics
                        :tag-statistics="tagStatistics"
                        :selected-tags="selectedTags"
                        :has-news-data="hasNewsData"
                        :sidebar-collapsed="sidebarCollapsed"
                        @toggle-tag="$emit('toggle-tag', $event)"
                    ></tag-statistics>
                </aside>
            </section>
        </main>
    </div>

    <!-- 加载指示器 -->
    <section id="loading-indicator" class="loading-indicator" aria-hidden="true" aria-label="加载中">
        <div class="loading-spinner" role="status" aria-live="polite" aria-label="正在加载"></div>
    </section>

    <!-- 错误提示 -->
    <section id="error-message" class="error-message" role="alert" aria-live="assertive" hidden></section>

    <!-- 通知容器 -->
    <section id="notifications" class="notifications-container" role="region" aria-label="通知区域"></section>

    <!-- 主功能脚本 -->
    <script type="module" src="/views/news/index.js" defer></script>
    <!-- 性能监控脚本 -->
    <script type="module" src="/utils/performance.js"></script>
</body>
</html>
