<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchHeader 组件演示</title>
    
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- 引入Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <!-- 引入项目基础样式 -->
    <link rel="stylesheet" href="../css/index.css">
    
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .test-header {
            text-align: center;
            color: white;
            margin-bottom: 2rem;
        }
        
        .test-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .test-header p {
            opacity: 0.9;
        }
        
        .component-wrapper {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }
        
        .loading-indicator {
            text-align: center;
            padding: 2rem;
            color: white;
        }
        
        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status-panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .status-panel h3 {
            margin-bottom: 1rem;
            color: #4facfe;
        }
        
        .status-item {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="test-container">
            <div class="test-header">
                <h1><i class="fas fa-vial"></i> SearchHeader 组件演示</h1>
                <p>测试 SearchHeader 组件的模板文件分离功能</p>
            </div>
            
            <div class="component-wrapper">
                <div v-if="!componentLoaded" class="loading-indicator">
                    <i class="fas fa-spinner"></i>
                    <p>正在加载组件...</p>
                </div>
                
                <search-header
                    v-if="componentLoaded"
                    :search-query="searchQuery"
                    :categories="categories"
                    :selected-categories="selectedCategories"
                    :sidebar-collapsed="sidebarCollapsed"
                    @update:search-query="searchQuery = $event"
                    @search-keydown="handleSearch"
                    @clear-search="searchQuery = ''"
                    @toggle-category="toggleCategory"
                    @toggle-sidebar="sidebarCollapsed = !sidebarCollapsed"
                ></search-header>
            </div>
            
            <div class="status-panel">
                <h3><i class="fas fa-info-circle"></i> 加载状态</h3>
                <div class="status-item">组件加载状态: {{ componentLoaded ? '✅ 已加载' : '⏳ 加载中...' }}</div>
                <div class="status-item">模板来源: {{ templateSource }}</div>
                <div class="status-item">当前搜索: {{ searchQuery || '（空）' }}</div>
                <div class="status-item">选中分类: {{ selectedCategoriesText }}</div>
                <div class="status-item">侧边栏状态: {{ sidebarCollapsed ? '收缩' : '展开' }}</div>
            </div>
        </div>
    </div>

    <!-- 引入SearchHeader组件 -->
    <script src="../components/SearchHeader/index.js"></script>
    
    <script>
        const { createApp } = Vue;
        
        const app = createApp({
            data() {
                return {
                    componentLoaded: false,
                    templateSource: '未知',
                    searchQuery: '',
                    sidebarCollapsed: false,
                    selectedCategories: new Set(),
                    categories: [
                        { key: 'ai', title: 'AI智能', icon: 'fas fa-brain' },
                        { key: 'tech', title: '科技', icon: 'fas fa-microchip' },
                        { key: 'internet', title: '互联网', icon: 'fas fa-globe' },
                        { key: 'mobile', title: '移动', icon: 'fas fa-mobile-alt' }
                    ]
                };
            },
            computed: {
                selectedCategoriesText() {
                    if (this.selectedCategories.size === 0) return '无';
                    return Array.from(this.selectedCategories).join(', ');
                }
            },
            methods: {
                handleSearch(event) {
                    if (event.key === 'Enter' && !event.shiftKey) {
                        event.preventDefault();
                        console.log('执行搜索:', this.searchQuery);
                    }
                },
                toggleCategory(categoryKey) {
                    if (this.selectedCategories.has(categoryKey)) {
                        this.selectedCategories.delete(categoryKey);
                    } else {
                        this.selectedCategories.add(categoryKey);
                    }
                    this.selectedCategories = new Set(this.selectedCategories);
                }
            }
        });
        
        // 等待组件加载完成
        window.addEventListener('SearchHeaderLoaded', (event) => {
            const SearchHeader = event.detail;
            console.log('SearchHeader 组件加载完成');
            
            // 检测模板来源
            if (SearchHeader.template.includes('fetch')) {
                app.templateSource = '外部HTML文件';
            } else {
                app.templateSource = SearchHeader.template.length > 1000 ? '外部HTML文件' : '内联模板（回退）';
            }
            
            app.config.globalProperties.componentLoaded = true;
            app.config.globalProperties.templateSource = app.templateSource;
            
            // 注册组件
            app.component('SearchHeader', SearchHeader);
            
            // 更新数据
            const appInstance = app.mount('#app');
            appInstance.componentLoaded = true;
            appInstance.templateSource = app.templateSource;
        });
        
        // 超时处理
        setTimeout(() => {
            if (!window.SearchHeader) {
                console.error('组件加载超时');
                const appInstance = app.mount('#app');
                appInstance.templateSource = '加载失败';
            }
        }, 5000);
    </script>
</body>
</html>
