<div class="sp-table-wrapper">
    <div v-if="loading" class="sp-table-loading">
        <yi-icon name="loading" spin></yi-icon> 加载中...
    </div>
    <div v-else-if="error" class="sp-table-error">
        <yi-icon name="error"></yi-icon> {{ error }}
    </div>
    <div v-else-if="stories.length === 0" class="sp-table-empty">
        <yi-icon name="inbox"></yi-icon> 暂无故事任务
    </div>
    <table v-else class="sp-table">
        <thead>
            <tr>
                <th
                    v-for="col in sortableColumns"
                    :key="col.label"
                    :class="['sp-th', thClass(col.field)]"
                    @click="col.sortable ? onSort(col.field) : null"
                >
                    <span class="sp-th-label">{{ col.label }}</span>
                    <span v-if="col.sortable && sortField === col.field" class="sp-sort-arrow">
                        {{ sortDirection === 'asc' ? '↑' : '↓' }}
                    </span>
                </th>
            </tr>
        </thead>
        <tbody>
            <tr v-for="story in stories" :key="story.name" class="sp-tr" @click="onSelect(story)">
                <td class="sp-td sp-td--name">
                    <span class="sp-story-name">{{ story.name }}</span>
                </td>
                <td class="sp-td sp-td--status">
                    <story-status-badge :status="story.status" size="sm"></story-status-badge>
                </td>
                <td class="sp-td sp-td--next">{{ story.nextStep }}</td>
                <td class="sp-td sp-td--notify">{{ story.hasNotify ? '📨' : '—' }}</td>
                <td class="sp-td sp-td--log">{{ story.hasLog ? '📜' : '—' }}</td>
                <td class="sp-td sp-td--files">{{ story.fileCount }}</td>
                <td class="sp-td sp-td--modified">{{ formatDate(story.lastModified) }}</td>
                <td class="sp-td sp-td--type">
                    <span class="sp-type-tag sp-type-tag--{{ story.type }}">{{ typeLabel(story.type) }}</span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
