<div class="sp-page">
    <header class="sp-header">
        <div class="sp-header-left">
            <h1 class="sp-header-title">故事任务面板</h1>
            <span v-if="totalStories > 0" class="sp-header-count">{{ totalStories }} 个故事</span>
        </div>
        <div class="sp-header-right">
            <div class="sp-search">
                <i class="fas fa-search sp-search-icon"></i>
                <input
                    type="text"
                    class="sp-search-input"
                    placeholder="搜索故事..."
                    v-model="localSearchQuery"
                />
            </div>
            <button class="sp-view-toggle" @click="toggleView" :title="viewMode === 'board' ? '切换列表视图' : '切换看板视图'">
                <i :class="viewMode === 'board' ? 'fas fa-list' : 'fas fa-columns'"></i>
            </button>
            <yi-button variant="ghost" icon="fas fa-sync-alt" @click="$emit('refresh')">刷新</yi-button>
        </div>
    </header>

    <div v-if="loading" class="sp-loading">
        <i class="fas fa-spinner fa-spin"></i> 加载中...
    </div>
    <div v-else-if="error" class="sp-error">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>

    <template v-else>
        <!-- Board View -->
        <div v-if="viewMode === 'board'" class="sp-kanban">
            <div v-for="col in kanbanColumns" :key="col.status" class="sp-column">
                <div class="sp-column-header" :class="'sp-column-header--' + col.status">
                    <story-status-badge :status="col.status" size="sm"></story-status-badge>
                    <span class="sp-column-count">{{ col.stories.length }}</span>
                </div>
                <div class="sp-column-cards">
                    <div
                        v-for="story in col.stories"
                        :key="story.name"
                        class="sp-card"
                        :class="'sp-card--' + story.status"
                        @click="openDetail(story)"
                    >
                        <div class="sp-card-name">{{ story.name }}</div>
                        <div class="sp-card-meta">
                            <span class="sp-card-type">{{ typeLabel(story.type) }}</span>
                            <span class="sp-card-files">{{ story.fileCount }} 个文件</span>
                        </div>
                        <div class="sp-card-date">{{ formatDate(story.lastModified) }}</div>
                    </div>
                    <div v-if="col.stories.length === 0" class="sp-column-empty">—</div>
                </div>
            </div>
        </div>

        <!-- List View -->
        <div v-if="viewMode === 'list'" class="sp-list-view">
            <story-list-table
                :stories="filteredStories"
                :loading="false"
                :error="null"
                @select="openDetail"
            ></story-list-table>
        </div>
    </template>

    <!-- Side Panel -->
    <div v-if="panelVisible" class="sp-panel-backdrop" @click="onBackdropClick" @keydown.escape="closePanel">
        <div class="sp-panel" role="dialog" aria-modal="true" aria-label="故事详情">
            <div class="sp-panel-header">
                <h2 class="sp-panel-title">{{ panelStory.name }}</h2>
                <button class="sp-panel-close" @click="closePanel" aria-label="关闭面板">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="sp-panel-body">
                <story-detail-card
                    :story="panelStory"
                    :syncing="syncing"
                    :panel="true"
                    @close="closePanel"
                    @sync="$emit('sync-story', $event)"
                ></story-detail-card>
            </div>
        </div>
    </div>
</div>
