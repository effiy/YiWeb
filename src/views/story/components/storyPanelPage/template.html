<div class="sp-page">
    <header class="sp-header">
        <div class="sp-header-left">
            <h1 class="sp-header-title">故事任务面板</h1>
            <span v-if="totalStories > 0" class="sp-header-count">{{ totalStories }} 个故事</span>
        </div>
        <header-actions @clear-cache="clearCache">
            <div class="sp-search">
                <yi-icon name="search" class-name="sp-search-icon"></yi-icon>
                <input
                    type="text"
                    class="sp-search-input"
                    placeholder="搜索故事..."
                    v-model="localSearchQuery"
                />
            </div>
            <div class="sp-view-segmented">
                <button
                    v-for="mode in viewModes"
                    :key="mode.value"
                    class="sp-view-seg"
                    :class="{ 'sp-view-seg--active': viewMode === mode.value }"
                    @click="setView(mode.value)"
                    :title="mode.label"
                >
                    <yi-icon :name="mode.icon"></yi-icon>
                    <span class="sp-view-seg-label">{{ mode.label }}</span>
                </button>
            </div>
        </header-actions>
    </header>

    <div v-if="loading" class="sp-loading">
        <yi-icon name="loading" spin></yi-icon> 加载中...
    </div>
    <div v-else-if="error" class="sp-error">
        <yi-icon name="error"></yi-icon> {{ error }}
    </div>

    <template v-else>
        <!-- Board View -->
        <div v-if="viewMode === 'board'" class="sp-kanban">
            <div v-for="col in kanbanColumns" :key="col.status" class="sp-column">
                <div class="sp-column-header" :class="'sp-column-header--' + col.status">
                    <story-status-badge :status="col.status" size="sm"></story-status-badge>
                    <span class="sp-column-count">{{ col.stories.length }}</span>
                </div>
                <div class="sp-column-cards">
                    <story-card
                        v-for="story in col.stories"
                        :key="story.name"
                        :story="story"
                        @select="openDetail"
                    ></story-card>
                    <div v-if="col.stories.length === 0" class="sp-column-empty">—</div>
                </div>
            </div>
        </div>

        <!-- Card Grid View -->
        <div v-if="viewMode === 'cards'" class="sp-card-grid">
            <story-card
                v-for="story in filteredStories"
                :key="story.name"
                :story="story"
                @select="openDetail"
            ></story-card>
            <div v-if="filteredStories.length === 0" class="sp-card-grid-empty">没有匹配的故事</div>
        </div>

        <!-- List View -->
        <div v-if="viewMode === 'list'" class="sp-list-view">
            <story-list-table
                :stories="filteredStories"
                :loading="false"
                :error="null"
                @select="openDetail"
            ></story-list-table>
        </div>
    </template>

    <!-- Side Panel -->
    <div v-if="panelVisible" class="sp-panel-backdrop" @click="onBackdropClick" @keydown.escape="closePanel">
        <div class="sp-panel" role="dialog" aria-modal="true" aria-label="故事详情">
            <div class="sp-panel-header">
                <h2 class="sp-panel-title">{{ panelStory.name }}</h2>
                <button class="sp-panel-close" @click="closePanel" aria-label="关闭面板">
                    <yi-icon name="close"></yi-icon>
                </button>
            </div>
            <div class="sp-panel-body">
                <story-detail-card
                    :story="panelStory"
                    :panel="true"
                    @close="closePanel"
                ></story-detail-card>
            </div>
        </div>
    </div>
</div>
