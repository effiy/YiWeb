<div class="sp-page">
    <header class="sp-header quantum-panel-header">
        <div class="sp-header-left">
            <h1 class="sp-header-title quantum-header-title">故事任务面板</h1>
            <span v-if="projectTags.length > 0" class="sp-header-count">{{ projectTags.length }} 个项目</span>
            <span v-if="projectTags.length > 0" class="sp-header-count">{{ storyTaskCount }} 个故事任务</span>
        </div>
        <header-actions @clear-cache="onClearCache">
            <div class="sp-search">
                <yi-icon name="search" class-name="sp-search-icon"></yi-icon>
                <input
                    type="text"
                    class="sp-search-input"
                    placeholder="搜索故事..."
                    :value="localSearchQuery"
                    @input="onSearchInput"
                />
                <button
                    v-if="localSearchQuery"
                    type="button"
                    class="sp-search-clear"
                    @click="onClearSearch"
                    aria-label="清除搜索"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </div>
            <div class="sp-view-segmented">
                <button
                    v-for="mode in viewModes"
                    :key="mode.value"
                    class="sp-view-seg"
                    :class="{ 'sp-view-seg--active': viewMode === mode.value }"
                    @click="onSetView(mode.value)"
                    :title="mode.label"
                >
                    <yi-icon :name="mode.icon"></yi-icon>
                    <span class="sp-view-seg-label">{{ mode.label }}</span>
                </button>
            </div>
        </header-actions>
    </header>

    <div v-if="totalStories > 0 && !loading" class="sp-meta-row">
        <div v-if="projectTags.length > 0 || untaggedCount > 0" class="sp-filter-bar-tags">
            <div class="sp-header-tags-row" :class="{ 'is-scrolled-right': tagsScrollLeft > 0, 'is-overflowing-right': !tagsScrollAtEnd }" @scroll="onTagsScroll">
                <button
                    type="button"
                    class="sp-filter-toggle"
                    @click="onToggleFilterBar"
                    :title="filterBarCollapsed ? '展开筛选' : '收起筛选'"
                >
                    <yi-icon :name="filterBarCollapsed ? 'chevron-down' : 'chevron-up'"></yi-icon>
                    <span class="sp-filter-toggle-label">筛选</span>
                </button>
                <button
                    class="sp-project-tag sp-project-tag--all"
                    :class="{ 'sp-project-tag--active': !tagFilterNoTags && selectedProjectTags.length === 0 }"
                    @click="onClearProjectTags"
                >全部</button>
                <button
                    v-if="untaggedCount > 0"
                    class="sp-project-tag"
                    :class="{ 'sp-project-tag--active': tagFilterNoTags }"
                    @click="onToggleUntagged"
                >没有故事 ({{ untaggedCount }})</button>
                <button
                    v-for="pt in projectTags"
                    :key="pt.name"
                    class="sp-project-tag"
                    :class="{ 'sp-project-tag--active': selectedProjectTags.includes(pt.name) }"
                    @click="onToggleSessionTag(pt.name)"
                >{{ pt.name }} ({{ pt.count }})</button>
            </div>
            <div class="sp-tags-fade sp-tags-fade--left" :class="{ 'is-visible': tagsScrollLeft > 0 }"></div>
            <div class="sp-tags-fade sp-tags-fade--right" :class="{ 'is-visible': !tagsScrollAtEnd }"></div>
        </div>
    </div>

    <div v-if="totalStories > 0 && !loading" class="sp-filter-bar" :class="{ 'is-collapsed': filterBarCollapsed }">
        <div class="sp-filter-group sp-filter-group--missing">
            <span class="sp-filter-label">缺失文档 ({{ missingTags.length }})</span>
            <button
                v-for="mt in missingTags"
                :key="mt.key"
                type="button"
                class="sp-filter-tag sp-filter-tag--missing"
                :class="{ active: selectedMissingTags.includes(mt.key) }"
                @click="onToggleMissingTag(mt.key)"
            >{{ mt.label }} ({{ mt.count }})</button>
            <button
                v-if="selectedMissingTags.length > 0"
                type="button"
                class="sp-filter-clear-inline"
                @click="onClearMissingTags"
                title="清除缺失文档筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
        <div class="sp-filter-collapsed-row">
            <div class="sp-filter-collapsed-scroll">
                <span v-if="!hasActiveFilters" class="sp-filter-collapsed-empty">未选择筛选</span>
                <span v-if="localSearchQuery" class="sp-filter-collapsed-pill">
                    搜索: {{ localSearchQuery }}
                    <button type="button" class="sp-filter-collapsed-pill-close" @click.stop="onClearSearch" title="移除搜索">×</button>
                </span>
                <span v-if="tagFilterNoTags" class="sp-filter-collapsed-pill">
                    没有故事
                    <button type="button" class="sp-filter-collapsed-pill-close" @click.stop="onToggleUntagged" title="移除筛选">×</button>
                </span>
                <span v-for="tag in selectedProjectTags" :key="'p-' + tag" class="sp-filter-collapsed-pill">
                    {{ tag }}
                    <button type="button" class="sp-filter-collapsed-pill-close" @click.stop="onToggleSessionTag(tag)" title="移除筛选">×</button>
                </span>
            </div>
            <button
                v-if="hasActiveFilters"
                type="button"
                class="sp-filter-collapsed-clear"
                @click="onClearAllFilters"
                title="清除所有筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
    </div>

    <div v-if="loading" class="sp-loading">
        <yi-icon name="loading" spin></yi-icon> 加载中...
    </div>
    <div v-else-if="error" class="sp-error">
        <yi-icon name="error"></yi-icon> {{ error }}
    </div>

    <template v-else>
        <!-- Card Grid View -->
        <div v-if="viewMode === 'cards'" class="sp-card-grid">
            <template v-for="group in groupedStories" :key="group.label">
                <div class="sp-card-group-header" :style="group.tag ? tagColorStyle(group.tag) : {}">
                    <span class="sp-card-group-label">{{ group.label }}</span>
                    <span class="sp-card-group-count">{{ group.stories.length }}</span>
                </div>
                <story-card
                    v-for="story in group.stories"
                    :key="group.label + '-' + story.name"
                    :story="story"
                    @select="onOpenDetail"
                ></story-card>
            </template>
            <div v-if="filteredStories.length === 0" class="sp-card-grid-empty">
                <span>{{ hasActiveFilters ? '没有匹配的故事' : '暂无故事' }}</span>
                <button
                    v-if="hasActiveFilters"
                    type="button"
                    class="sp-empty-clear-btn"
                    @click="onClearAllFilters"
                >清除筛选条件</button>
            </div>
        </div>

        <!-- List View -->
        <div v-if="viewMode === 'list'" class="sp-list-view">
            <template v-for="group in groupedStories" :key="group.label">
                <div class="sp-list-group-header" :style="group.tag ? tagColorStyle(group.tag) : {}">
                    <span class="sp-list-group-label">{{ group.label }}</span>
                    <span class="sp-list-group-count">{{ group.stories.length }}</span>
                </div>
                <story-list-table
                    :stories="group.stories"
                    :loading="false"
                    :error="null"
                    :sort-field="sortField"
                    :sort-direction="sortDirection"
                    @select="onOpenDetail"
                    @sort="onToggleSort"
                ></story-list-table>
            </template>
        </div>
    </template>

    <!-- Side Panel -->
    <div v-if="panelVisible" class="sp-panel-backdrop" @click="onBackdropClick" @keydown.escape="onClosePanel">
        <div class="sp-panel" role="dialog" aria-modal="true" aria-label="故事详情">
            <div class="sp-panel-header">
                <h2 class="sp-panel-title">{{ panelStory.name }}</h2>
                <button class="sp-panel-close" @click="onClosePanel" aria-label="关闭面板">
                    <yi-icon name="close"></yi-icon>
                </button>
            </div>
            <div class="sp-panel-body">
                <story-detail-card
                    :story="panelStory"
                    :panel="true"
                    @close="onClosePanel"
                ></story-detail-card>
            </div>
        </div>
    </div>
</div>
