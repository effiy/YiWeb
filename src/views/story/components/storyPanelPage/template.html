<div class="sp-page">
    <header class="sp-header quantum-panel-header">
        <div class="sp-header-left">
            <h1 class="sp-header-title quantum-header-title">故事任务面板</h1>
            <span v-if="filteredStories.length > 0" class="sp-header-count">{{ filteredStories.length }} 个故事</span>
        </div>
        <header-actions @clear-cache="clearCache">
            <div class="sp-search">
                <yi-icon name="search" class-name="sp-search-icon"></yi-icon>
                <input
                    type="text"
                    class="sp-search-input"
                    placeholder="搜索故事..."
                    v-model="localSearchQuery"
                />
                <button
                    v-if="localSearchQuery"
                    type="button"
                    class="sp-search-clear"
                    @click="localSearchQuery = ''"
                    aria-label="清除搜索"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </div>
            <div class="sp-view-segmented">
                <button
                    v-for="mode in viewModes"
                    :key="mode.value"
                    class="sp-view-seg"
                    :class="{ 'sp-view-seg--active': viewMode === mode.value }"
                    @click="setView(mode.value)"
                    :title="mode.label"
                >
                    <yi-icon :name="mode.icon"></yi-icon>
                    <span class="sp-view-seg-label">{{ mode.label }}</span>
                </button>
            </div>
        </header-actions>
    </header>

    <div v-if="totalStories > 0 && !loading" class="sp-meta-row">
        <div v-if="allProjectTags.length > 0" class="sp-header-tags-wrapper">
            <div class="sp-header-tags-row" :class="{ 'is-scrolled-right': tagsScrollLeft > 0, 'is-overflowing-right': !tagsScrollAtEnd }" @scroll="handleTagsScroll">
                <div class="sp-meta-filter-actions">
                    <button
                        type="button"
                        class="sp-meta-filter-toggle"
                        @click="toggleFilterBar"
                        :title="filterBarCollapsed ? '展开筛选栏' : '折叠筛选栏'"
                    >
                        <yi-icon :name="filterBarCollapsed ? 'chevron-down' : 'chevron-up'"></yi-icon>
                        <span class="sp-meta-filter-toggle-label">筛选</span>
                    </button>
                </div>
                <button
                    class="sp-project-tag"
                    :class="{ 'sp-project-tag--active': selectedProjectTags.length === 0 }"
                    @click="clearProjectTags"
                >全部<span class="sp-project-tag-count">{{ totalStories }}</span></button>
                <button
                    v-for="tag in allProjectTags"
                    :key="tag"
                    class="sp-project-tag"
                    :class="{ 'sp-project-tag--active': selectedProjectTags.includes(tag) }"
                    :style="tagColorStyle(tag)"
                    @click="toggleProjectTag(tag)"
                >{{ tag }}<span class="sp-project-tag-count">{{ projectTagCounts[tag] || 0 }}</span></button>
            </div>
            <div class="sp-tags-fade sp-tags-fade--left" :class="{ 'is-visible': tagsScrollLeft > 0 }"></div>
            <div class="sp-tags-fade sp-tags-fade--right" :class="{ 'is-visible': !tagsScrollAtEnd }"></div>
        </div>
        <div class="sp-stats-bar">
            <button type="button"
                class="sp-stat-item sp-stat-btn"
                :class="{ 'sp-stat-btn--active': selectedDocFilter === 'story_task' }"
                @click="selectDocFilter('story_task')"
            >
                <yi-icon name="circle" class-name="sp-stat-icon quantum-stat-icon"></yi-icon>
                <span class="sp-stat-value">{{ documentCounts.story_task || 0 }}</span>
                <span class="sp-stat-label">规划</span>
            </button>
            <button type="button"
                class="sp-stat-item sp-stat-btn"
                :class="{ 'sp-stat-btn--active': selectedDocFilter === 'scenario' }"
                @click="selectDocFilter('scenario')"
            >
                <yi-icon name="file-alt" class-name="sp-stat-icon quantum-stat-icon"></yi-icon>
                <span class="sp-stat-value">{{ documentCounts.scenario || 0 }}</span>
                <span class="sp-stat-label">设计</span>
            </button>
            <button type="button"
                class="sp-stat-item sp-stat-btn"
                :class="{ 'sp-stat-btn--active': selectedDocFilter === 'implementation' }"
                @click="selectDocFilter('implementation')"
            >
                <yi-icon name="code" class-name="sp-stat-icon quantum-stat-icon"></yi-icon>
                <span class="sp-stat-value">{{ documentCounts.implementation || 0 }}</span>
                <span class="sp-stat-label">开发</span>
            </button>
            <button type="button"
                class="sp-stat-item sp-stat-btn"
                :class="{ 'sp-stat-btn--active': selectedDocFilter === 'test_report' }"
                @click="selectDocFilter('test_report')"
            >
                <yi-icon name="check-circle" class-name="sp-stat-icon quantum-stat-icon"></yi-icon>
                <span class="sp-stat-value">{{ documentCounts.test_report || 0 }}</span>
                <span class="sp-stat-label">测试</span>
            </button>
            <button type="button"
                class="sp-stat-item sp-stat-btn"
                :class="{ 'sp-stat-btn--active': selectedDocFilter === 'retrospective' }"
                @click="selectDocFilter('retrospective')"
            >
                <yi-icon name="lightbulb" class-name="sp-stat-icon quantum-stat-icon"></yi-icon>
                <span class="sp-stat-value">{{ documentCounts.retrospective || 0 }}</span>
                <span class="sp-stat-label">运营</span>
            </button>
        </div>
    </div>

    <div v-if="totalStories > 0 && !loading" class="sp-filter-bar" :class="{ 'is-collapsed': filterBarCollapsed }">
        <div class="sp-filter-group">
            <span class="sp-filter-label">故事</span>
            <template v-if="storyOptions.length > 0">
                <button
                    v-for="opt in storyOptions"
                    :key="'story-' + opt.value"
                    type="button"
                    class="sp-filter-tag"
                    :class="{ active: selectedStoryTags.includes(opt.value) }"
                    @click="toggleStoryTag(opt.value)"
                >{{ opt.label }} <span class="sp-filter-count">{{ opt.count }}</span></button>
                <button
                    v-if="selectedStoryTags.length > 0"
                    type="button"
                    class="sp-filter-clear--inline"
                    @click="clearStoryTags"
                    title="清除故事筛选"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </template>
            <span v-else class="sp-filter-empty">没有故事</span>
        </div>
        <div class="sp-filter-group sp-filter-group--doc">
            <span class="sp-filter-label">状态</span>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedDocFilter === 'story_task' }"
                @click="selectDocFilter('story_task')"
            >规划 <span class="sp-filter-count">{{ documentCounts.story_task || 0 }}</span></button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedDocFilter === 'scenario' }"
                @click="selectDocFilter('scenario')"
            >设计 <span class="sp-filter-count">{{ documentCounts.scenario || 0 }}</span></button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedDocFilter === 'implementation' }"
                @click="selectDocFilter('implementation')"
            >开发 <span class="sp-filter-count">{{ documentCounts.implementation || 0 }}</span></button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedDocFilter === 'test_report' }"
                @click="selectDocFilter('test_report')"
            >测试 <span class="sp-filter-count">{{ documentCounts.test_report || 0 }}</span></button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedDocFilter === 'retrospective' }"
                @click="selectDocFilter('retrospective')"
            >运营 <span class="sp-filter-count">{{ documentCounts.retrospective || 0 }}</span></button>
            <button
                v-if="selectedDocFilter"
                type="button"
                class="sp-filter-clear--inline"
                @click="selectDocFilter(selectedDocFilter)"
                title="清除文档类型筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
        <div class="sp-filter-group sp-filter-group--missing">
            <span class="sp-filter-label">缺失</span>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedMissingFilter === 'design' }"
                @click="selectMissingFilter('design')"
            >缺设计</button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedMissingFilter === 'develop' }"
                @click="selectMissingFilter('develop')"
            >缺开发</button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedMissingFilter === 'testing' }"
                @click="selectMissingFilter('testing')"
            >缺测试</button>
            <button
                type="button"
                class="sp-filter-tag"
                :class="{ active: selectedMissingFilter === 'operations' }"
                @click="selectMissingFilter('operations')"
            >缺运营</button>
            <button
                v-if="selectedMissingFilter"
                type="button"
                class="sp-filter-clear--inline"
                @click="selectMissingFilter(selectedMissingFilter)"
                title="清除缺失筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
        <div class="sp-filter-collapsed-row">
            <div class="sp-filter-collapsed-scroll">
                <span v-if="filterSummaryPills.length === 0 && !localSearchQuery" class="sp-filter-collapsed-empty">未选择筛选</span>
                <span v-if="localSearchQuery" class="sp-filter-collapsed-pill">
                    搜索: {{ localSearchQuery }}
                    <button type="button" class="sp-filter-collapsed-pill-close" @click.stop="localSearchQuery = ''" title="移除搜索">×</button>
                </span>
                <span v-for="pill in filterSummaryPills" :key="pill.type + '-' + pill.label" class="sp-filter-collapsed-pill" :style="pill.type === 'tag' ? tagColorStyle(pill.label) : {}">
                    {{ pill.label }}
                    <button type="button" class="sp-filter-collapsed-pill-close" @click.stop="pill.clear()" title="移除筛选">×</button>
                </span>
            </div>
            <button
                v-if="hasActiveFilters"
                type="button"
                class="sp-filter-collapsed-clear"
                @click="clearAllFilters"
                title="清除所有筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
    </div>

    <div v-if="loading" class="sp-loading">
        <yi-icon name="loading" spin></yi-icon> 加载中...
    </div>
    <div v-else-if="error" class="sp-error">
        <yi-icon name="error"></yi-icon> {{ error }}
    </div>

    <template v-else>
        <!-- Board View -->
        <div v-if="viewMode === 'board'" class="sp-kanban">
            <div v-for="col in kanbanColumns" :key="col.status" class="sp-column">
                <div class="sp-column-header" :class="'sp-column-header--' + col.status">
                    <story-status-badge :status="col.status" size="sm"></story-status-badge>
                    <span class="sp-column-count">{{ col.stories.length }}</span>
                </div>
                <div class="sp-column-cards">
                    <story-card
                        v-for="story in col.stories"
                        :key="story.name"
                        :story="story"
                        @select="openDetail"
                    ></story-card>
                    <div v-if="col.stories.length === 0" class="sp-column-empty">—</div>
                </div>
            </div>
        </div>

        <!-- Card Grid View -->
        <div v-if="viewMode === 'cards'" class="sp-card-grid">
            <template v-for="group in groupedStories" :key="group.label">
                <div class="sp-card-group-header" :style="group.tag ? tagColorStyle(group.tag) : {}">
                    <span class="sp-card-group-label">{{ group.label }}</span>
                    <span class="sp-card-group-count">{{ group.stories.length }}</span>
                </div>
                <story-card
                    v-for="story in group.stories"
                    :key="group.label + '-' + story.name"
                    :story="story"
                    @select="openDetail"
                ></story-card>
            </template>
            <div v-if="filteredStories.length === 0" class="sp-card-grid-empty">
                <span>{{ hasActiveFilters ? '没有匹配的故事' : '暂无故事' }}</span>
                <button
                    v-if="hasActiveFilters"
                    type="button"
                    class="sp-empty-clear-btn"
                    @click="clearAllFilters"
                >清除筛选条件</button>
            </div>
        </div>

        <!-- List View -->
        <div v-if="viewMode === 'list'" class="sp-list-view">
            <template v-for="group in groupedStories" :key="group.label">
                <div class="sp-list-group-header" :style="group.tag ? tagColorStyle(group.tag) : {}">
                    <span class="sp-list-group-label">{{ group.label }}</span>
                    <span class="sp-list-group-count">{{ group.stories.length }}</span>
                </div>
                <story-list-table
                    :stories="group.stories"
                    :loading="false"
                    :error="null"
                    :sort-field="sortField"
                    :sort-direction="sortDirection"
                    @select="openDetail"
                    @sort="toggleSort"
                ></story-list-table>
            </template>
        </div>
    </template>

    <!-- Side Panel -->
    <div v-if="panelVisible" class="sp-panel-backdrop" @click="onBackdropClick" @keydown.escape="closePanel">
        <div class="sp-panel" role="dialog" aria-modal="true" aria-label="故事详情">
            <div class="sp-panel-header">
                <h2 class="sp-panel-title">{{ panelStory.name }}</h2>
                <button class="sp-panel-close" @click="closePanel" aria-label="关闭面板">
                    <yi-icon name="close"></yi-icon>
                </button>
            </div>
            <div class="sp-panel-body">
                <story-detail-card
                    :story="panelStory"
                    :panel="true"
                    @close="closePanel"
                ></story-detail-card>
            </div>
        </div>
    </div>
</div>
