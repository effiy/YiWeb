<div class="sp-page">
    <header class="sp-header">
        <div class="sp-header-left">
            <h1 class="sp-header-title">故事任务面板</h1>
            <span v-if="totalStories > 0" class="sp-header-count">{{ totalStories }} 个故事</span>
        </div>
        <div class="sp-header-right">
            <div class="sp-search">
                <i class="fas fa-search sp-search-icon"></i>
                <input
                    type="text"
                    class="sp-search-input"
                    placeholder="搜索故事..."
                    v-model="localSearchQuery"
                />
            </div>
            <yi-button variant="ghost" icon="fas fa-sync-alt" @click="$emit('refresh')">
                刷新
            </yi-button>
        </div>
    </header>

    <div v-if="!hasSelectedStory" class="sp-overview">
        <div class="sp-status-cards">
            <div class="sp-status-card sp-status-card--code_done">
                <span class="sp-status-card-value">{{ statusCounts.code_done || 0 }}</span>
                <span class="sp-status-card-label">编码完成</span>
            </div>
            <div class="sp-status-card sp-status-card--code_in_progress">
                <span class="sp-status-card-value">{{ statusCounts.code_in_progress || 0 }}</span>
                <span class="sp-status-card-label">编码进行中</span>
            </div>
            <div class="sp-status-card sp-status-card--docs_done">
                <span class="sp-status-card-value">{{ statusCounts.docs_done || 0 }}</span>
                <span class="sp-status-card-label">文档完成</span>
            </div>
            <div class="sp-status-card sp-status-card--docs_in_progress">
                <span class="sp-status-card-value">{{ statusCounts.docs_in_progress || 0 }}</span>
                <span class="sp-status-card-label">文档进行中</span>
            </div>
            <div class="sp-status-card sp-status-card--not_started">
                <span class="sp-status-card-value">{{ statusCounts.not_started || 0 }}</span>
                <span class="sp-status-card-label">未开始</span>
            </div>
            <div class="sp-status-card sp-status-card--blocked">
                <span class="sp-status-card-value">{{ statusCounts.blocked || 0 }}</span>
                <span class="sp-status-card-label">已阻断</span>
            </div>
        </div>

        <story-list-table
            :stories="filteredStories"
            :loading="loading"
            :error="error"
            @select="$emit('select-story', $event)"
        ></story-list-table>
    </div>

    <div v-else class="sp-detail-view">
        <story-detail-card
            :story="selectedStory"
            :syncing="syncing"
            @back="$emit('back')"
            @sync="$emit('sync-story', $event)"
        ></story-detail-card>
    </div>
</div>
