<div class="aicr-page">
    <header class="aicr-header">
        <div class="aicr-header-left">
            <h1 class="aicr-header-title">代码审查</h1>
            <span v-if="allTags && allTags.length > 0" class="aicr-header-count">{{ allTags.length }} 个项目</span>
        </div>
        <header-actions @clear-cache="clearCacheAndRefresh">
                <div class="aicr-search">
                    <yi-icon name="search" class-name="aicr-search-icon"></yi-icon>
                    <input
                        type="text"
                        class="aicr-search-input"
                        placeholder="搜索会话和文件..."
                        :value="sessionSearchQuery"
                        @input="handleSessionSearchInput"
                        @keydown="handleSessionSearchKeydown"
                        aria-label="搜索会话和文件"
                    />
                    <button
                        v-if="sessionSearchQuery"
                        type="button"
                        class="aicr-search-clear"
                        @click="clearSessionSearch"
                        aria-label="清除搜索"
                    >
                        <yi-icon name="close"></yi-icon>
                    </button>
                </div>
            </header-actions>
    </header>

    <div v-if="!sessionLoading && sessions && sessions.length > 0" class="aicr-meta-row">
        <div v-if="allTags && (allTags.length > 0 || (tagCounts && tagCounts.noTagsCount > 0))" class="aicr-header-tags-wrapper">
            <div class="aicr-header-tags-row" :class="{ 'is-scrolled-right': tagsScrollLeft > 0, 'is-overflowing-right': !tagsScrollAtEnd }" @scroll="handleTagsScroll">
                <div class="aicr-meta-filter-actions">
                    <button
                        type="button"
                        class="aicr-meta-filter-toggle"
                        @click="handleFilterToggle"
                        :title="filterBarCollapsed ? '展开筛选栏' : '折叠筛选栏'"
                    >
                        <yi-icon :name="filterBarCollapsed ? 'chevron-down' : 'chevron-up'"></yi-icon>
                        <span class="aicr-meta-filter-toggle-label">筛选</span>
                    </button>
                </div>
                <button
                    class="aicr-project-tag aicr-project-tag--all"
                    :class="{ 'aicr-project-tag--active': !tagFilterNoTags && (!selectedSessionTags || selectedSessionTags.length === 0) }"
                    @click="clearAllTags"
                >全部</button>
                <button
                    v-if="tagCounts && tagCounts.noTagsCount > 0"
                    class="aicr-project-tag"
                    :class="{ 'aicr-project-tag--active': tagFilterNoTags }"
                    @click="handleTagFilterNoTags(!tagFilterNoTags)"
                >没有故事 ({{ tagCounts.noTagsCount }})</button>
                <button
                    v-for="tag in allTags"
                    :key="tag"
                    class="aicr-project-tag"
                    :class="{ 'aicr-project-tag--active': selectedSessionTags && selectedSessionTags.includes(tag) }"
                    @click="toggleAicrTag(tag)"
                >{{ tag }} ({{ tagCounts && tagCounts.counts ? (tagCounts.counts[tag] || 0) : 0 }})</button>
            </div>
            <div class="aicr-tags-fade aicr-tags-fade--left" :class="{ 'is-visible': tagsScrollLeft > 0 }"></div>
            <div class="aicr-tags-fade aicr-tags-fade--right" :class="{ 'is-visible': !tagsScrollAtEnd }"></div>
        </div>
        <div class="aicr-stats-bar">
            <div class="aicr-stat-item">
                <yi-icon name="file" class-name="aicr-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ filteredFileCount }}</span>
                <span class="aicr-stat-label">文件</span>
            </div>
            <div class="aicr-stat-item">
                <yi-icon name="tag" class-name="aicr-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ subTags.length }}</span>
                <span class="aicr-stat-label">故事</span>
            </div>
            <div class="aicr-stat-item">
                <yi-icon name="server" class-name="aicr-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ prefixTags.length }}</span>
                <span class="aicr-stat-label">前缀</span>
            </div>
            <div class="aicr-stat-item">
                <yi-icon name="server" class-name="aicr-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ suffixTags.length }}</span>
                <span class="aicr-stat-label">后缀</span>
            </div>
        </div>
    </div>

    <div v-if="!sessionLoading && sessions && sessions.length > 0" class="aicr-filter-bar" :class="{ 'is-collapsed': filterBarCollapsed }">
        <div class="aicr-filter-group">
            <span class="aicr-filter-label">故事</span>
            <template v-if="subTags && subTags.length > 0">
                <button
                    v-if="subTagCounts && subTagCounts.noTagsCount > 0"
                    type="button"
                    class="aicr-filter-tag"
                    :class="{ active: tagFilterNoTags }"
                    @click="toggleTagFilterNoTags"
                >没有故事 ({{ subTagCounts.noTagsCount }})</button>
                <button
                    v-for="tag in subTags"
                    :key="tag"
                    type="button"
                    class="aicr-filter-tag"
                    :class="{ active: selectedSessionTags && selectedSessionTags.includes(tag) }"
                    @click="toggleAicrTag(tag)"
                >{{ tag }} ({{ subTagCounts && subTagCounts.counts ? (subTagCounts.counts[tag] || 0) : 0 }})</button>
                <button
                    v-if="(selectedSessionTags && selectedSessionTags.length > 0) || tagFilterNoTags"
                    type="button"
                    class="aicr-filter-clear aicr-filter-clear--inline"
                    @click="clearAllTags"
                    title="清除故事筛选"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </template>
            <span v-else class="aicr-filter-empty">没有故事</span>
        </div>
        <div class="aicr-filter-group aicr-filter-group--prefix">
            <span class="aicr-filter-label">前缀</span>
            <template v-if="prefixTags && prefixTags.length > 0">
                <button
                    v-for="pt in prefixTags"
                    :key="pt.prefix"
                    type="button"
                    class="aicr-filter-tag aicr-filter-tag--prefix"
                    :class="{ active: selectedPrefixTags && selectedPrefixTags.includes(pt.prefix) }"
                    @click="togglePrefixTag(pt.prefix)"
                >{{ pt.prefix }} ({{ pt.count }})</button>
                <button
                    v-if="selectedPrefixTags && selectedPrefixTags.length > 0"
                    type="button"
                    class="aicr-filter-clear aicr-filter-clear--inline"
                    @click="clearPrefixTags"
                    title="清除前缀筛选"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </template>
            <span v-else class="aicr-filter-empty">没有前缀</span>
        </div>
        <div class="aicr-filter-group aicr-filter-group--suffix">
            <span class="aicr-filter-label">后缀</span>
            <template v-if="suffixTags && suffixTags.length > 0">
                <button
                    v-for="st in suffixTags"
                    :key="st.suffix"
                    type="button"
                    class="aicr-filter-tag aicr-filter-tag--suffix"
                    :class="{ active: selectedSuffixTags && selectedSuffixTags.includes(st.suffix) }"
                    @click="toggleSuffixTag(st.suffix)"
                >{{ st.suffix }} ({{ st.count }})</button>
                <button
                    v-if="selectedSuffixTags && selectedSuffixTags.length > 0"
                    type="button"
                    class="aicr-filter-clear aicr-filter-clear--inline"
                    @click="clearSuffixTags"
                    title="清除后缀筛选"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </template>
            <span v-else class="aicr-filter-empty">没有后缀</span>
        </div>
        <div class="aicr-filter-collapsed-row">
            <div class="aicr-filter-collapsed-scroll">
                <span v-if="!tagFilterNoTags && (!selectedSessionTags || selectedSessionTags.length === 0) && (!selectedPrefixTags || selectedPrefixTags.length === 0) && (!selectedSuffixTags || selectedSuffixTags.length === 0)" class="aicr-filter-collapsed-empty">未选择筛选</span>
                <span v-if="tagFilterNoTags" class="aicr-filter-collapsed-pill">
                    没有故事
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleTagFilterNoTags" title="移除筛选">×</button>
                </span>
                <span v-for="tag in (selectedSessionTags || [])" :key="tag" class="aicr-filter-collapsed-pill">
                    {{ tag }}
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleAicrTag(tag)" title="移除筛选">×</button>
                </span>
                <span v-for="prefix in (selectedPrefixTags || [])" :key="prefix" class="aicr-filter-collapsed-pill aicr-filter-collapsed-pill--prefix">
                    {{ prefix }}
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="togglePrefixTag(prefix)" title="移除筛选">×</button>
                </span>
                <span v-for="suffix in (selectedSuffixTags || [])" :key="suffix" class="aicr-filter-collapsed-pill aicr-filter-collapsed-pill--suffix">
                    {{ suffix }}
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleSuffixTag(suffix)" title="移除筛选">×</button>
                </span>
            </div>
            <button
                v-if="sessionSearchQuery || (selectedSessionTags && selectedSessionTags.length > 0) || tagFilterNoTags || (selectedPrefixTags && selectedPrefixTags.length > 0) || (selectedSuffixTags && selectedSuffixTags.length > 0)"
                type="button"
                class="aicr-filter-collapsed-clear"
                @click="clearAllAicrFilters"
                title="清除所有筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
    </div>

    <main class="aicr-main">
        <aicr-sidebar></aicr-sidebar>
        <aicr-code-area></aicr-code-area>
    </main>

    <!-- 键盘快捷键帮助面板 -->
    <keyboard-shortcuts-help
        :visible="showKeyboardShortcuts"
        @close="showKeyboardShortcuts = false"
    ></keyboard-shortcuts-help>
</div>
