<aicr-header
    :all-tags="allTags"
    :selected-tags="selectedSessionTags"
    :tag-filter-no-tags="tagFilterNoTags"
    :tag-counts="tagCounts"
    :search-query="searchQuery"
    :sidebar-collapsed="sidebarCollapsed"
    @tag-select="handleTagSelect"
    @tag-clear="handleTagClear"
    @tag-filter-no-tags="handleTagFilterNoTags"
    @search-input="handleSearchInput"
    @search-keydown="handleMessageInput"
    @composition-start="handleCompositionStart"
    @composition-end="handleCompositionEnd"
    @clear-search="clearSearch"
    @clear-cache="clearCacheAndRefresh"
></aicr-header>

<div v-if="!sessionLoading && sessions && sessions.length > 0" class="aicr-stats-bar">
    <div class="aicr-stat-item">
        <yi-icon name="inbox" class-name="aicr-stat-icon"></yi-icon>
        <span class="aicr-stat-value">{{ sessions.length }}</span>
        <span class="aicr-stat-label">会话</span>
    </div>
    <div class="aicr-stat-item">
        <yi-icon name="tag" class-name="aicr-stat-icon"></yi-icon>
        <span class="aicr-stat-value">{{ allTags.length }}</span>
        <span class="aicr-stat-label">标签</span>
    </div>
    <div class="aicr-stat-item">
        <yi-icon name="folder" class-name="aicr-stat-icon"></yi-icon>
        <span class="aicr-stat-value">{{ fileTreeStats.folders }}</span>
        <span class="aicr-stat-label">文件夹</span>
    </div>
    <div class="aicr-stat-item">
        <yi-icon name="file" class-name="aicr-stat-icon"></yi-icon>
        <span class="aicr-stat-value">{{ fileTreeStats.files }}</span>
        <span class="aicr-stat-label">文件</span>
    </div>
</div>

<div v-if="!sessionLoading && sessions && sessions.length > 0" class="aicr-filter-bar">
        <div class="aicr-filter-search">
            <yi-icon name="search" class-name="aicr-filter-search-icon"></yi-icon>
            <input
                type="text"
                class="aicr-filter-search-input"
                :value="sessionSearchQuery"
                @input="handleSessionSearchInput"
                @keydown="handleSessionSearchKeydown"
                placeholder="搜索会话..."
                aria-label="搜索会话"
            />
            <button
                v-if="sessionSearchQuery"
                type="button"
                class="aicr-filter-search-clear"
                @click="clearSessionSearch"
                aria-label="清除会话搜索"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
        <button
            v-if="sessionSearchQuery || selectedSessionTags.length > 0 || tagFilterNoTags"
            type="button"
            class="aicr-filter-clear-all"
            @click="clearAllAicrFilters"
            title="清除所有筛选"
        >
            <yi-icon name="close"></yi-icon>
            <span>清除筛选</span>
        </button>
    </div>

<main class="aicr-main">
    <aicr-sidebar></aicr-sidebar>
    <aicr-code-area></aicr-code-area>
</main>

<!-- 键盘快捷键帮助面板 -->
<keyboard-shortcuts-help
    :visible="showKeyboardShortcuts"
    @close="showKeyboardShortcuts = false"
></keyboard-shortcuts-help>
