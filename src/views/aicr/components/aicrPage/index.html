<div class="aicr-page">
    <header class="aicr-header quantum-panel-header">
        <div class="aicr-header-left">
            <h1 class="aicr-header-title quantum-header-title">代码审查</h1>
            <span v-if="allTags && allTags.length > 0" class="aicr-header-count">{{ allTags.length }} 个项目</span>
        </div>
        <header-actions @clear-cache="clearCacheAndRefresh">
                <div class="aicr-search">
                    <yi-icon name="search" class-name="aicr-search-icon"></yi-icon>
                    <input
                        type="text"
                        class="aicr-search-input"
                        placeholder="搜索会话和文件..."
                        :value="sessionSearchQuery"
                        @input="handleSessionSearchInput"
                        @keydown="handleSessionSearchKeydown"
                        aria-label="搜索会话和文件"
                    />
                    <button
                        v-if="sessionSearchQuery"
                        type="button"
                        class="aicr-search-clear"
                        @click="clearSessionSearch"
                        aria-label="清除搜索"
                    >
                        <yi-icon name="close"></yi-icon>
                    </button>
                </div>
                <div class="aicr-view-segmented">
                    <button
                        v-for="mode in viewModes"
                        :key="mode.value"
                        class="aicr-view-seg"
                        :class="{ 'aicr-view-seg--active': viewMode === mode.value }"
                        @click="setViewMode(mode.value)"
                        :title="mode.label"
                    >
                        <yi-icon :name="mode.icon"></yi-icon>
                        <span class="aicr-view-seg-label">{{ mode.label }}</span>
                    </button>
                </div>
            </header-actions>
    </header>

    <div v-if="!sessionLoading && sessions && sessions.length > 0" class="aicr-meta-row">
        <div v-if="allTags && (allTags.length > 0 || (tagCounts && tagCounts.noTagsCount > 0))" class="aicr-header-tags-wrapper">
            <div class="aicr-header-tags-row" :class="{ 'is-scrolled-right': tagsScrollLeft > 0, 'is-overflowing-right': !tagsScrollAtEnd }" @scroll="handleTagsScroll">
                <div class="aicr-meta-filter-actions">
                    <button
                        type="button"
                        class="aicr-meta-filter-toggle"
                        @click="handleFilterToggle"
                        :title="filterBarCollapsed ? '展开筛选栏' : '折叠筛选栏'"
                    >
                        <yi-icon :name="filterBarCollapsed ? 'chevron-down' : 'chevron-up'"></yi-icon>
                        <span class="aicr-meta-filter-toggle-label">筛选</span>
                    </button>
                </div>
                <button
                    class="aicr-project-tag aicr-project-tag--all"
                    :class="{ 'aicr-project-tag--active': !tagFilterNoTags && (!selectedSessionTags || selectedSessionTags.length === 0) }"
                    @click="clearAllTags"
                >全部</button>
                <button
                    v-if="tagCounts && tagCounts.noTagsCount > 0"
                    class="aicr-project-tag"
                    :class="{ 'aicr-project-tag--active': tagFilterNoTags }"
                    @click="handleTagFilterNoTags(!tagFilterNoTags)"
                >没有故事 ({{ tagCounts.noTagsCount }})</button>
                <button
                    v-for="tag in allTags"
                    :key="tag"
                    class="aicr-project-tag"
                    :class="{ 'aicr-project-tag--active': selectedSessionTags && selectedSessionTags.includes(tag) }"
                    @click="toggleAicrTag(tag)"
                >{{ tag }} ({{ tagCounts && tagCounts.counts ? (tagCounts.counts[tag] || 0) : 0 }})</button>
            </div>
            <div class="aicr-tags-fade aicr-tags-fade--left" :class="{ 'is-visible': tagsScrollLeft > 0 }"></div>
            <div class="aicr-tags-fade aicr-tags-fade--right" :class="{ 'is-visible': !tagsScrollAtEnd }"></div>
        </div>
        <div class="aicr-stats-bar">
            <div class="aicr-stat-item">
                <yi-icon name="file" class-name="aicr-stat-icon quantum-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ filteredFileCount }}</span>
                <span class="aicr-stat-label">文件</span>
            </div>
            <button
                type="button"
                class="aicr-stat-item aicr-stat-btn"
                :class="{ 'aicr-stat-btn--active': selectedTypeTags && selectedTypeTags.includes('故事任务') }"
                @click="toggleTypeTag('故事任务')"
            >
                <yi-icon name="tag" class-name="aicr-stat-icon quantum-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ storyTaskCount }}</span>
                <span class="aicr-stat-label">故事</span>
            </button>
            <button
                type="button"
                class="aicr-stat-item aicr-stat-btn"
                :class="{ 'aicr-stat-btn--active': selectedTypeTags && selectedTypeTags.includes('使用场景') }"
                @click="toggleTypeTag('使用场景')"
            >
                <yi-icon name="layout" class-name="aicr-stat-icon quantum-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ scenarioCount }}</span>
                <span class="aicr-stat-label">场景</span>
            </button>
            <button
                type="button"
                class="aicr-stat-item aicr-stat-btn"
                :class="{ 'aicr-stat-btn--active': selectedTypeTags && selectedTypeTags.includes('技术评审') }"
                @click="toggleTypeTag('技术评审')"
            >
                <yi-icon name="edit" class-name="aicr-stat-icon quantum-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ designReviewCount }}</span>
                <span class="aicr-stat-label">设计</span>
            </button>
            <button
                type="button"
                class="aicr-stat-item aicr-stat-btn"
                :class="{ 'aicr-stat-btn--active': selectedTypeTags && selectedTypeTags.includes('自改进复盘') }"
                @click="toggleTypeTag('自改进复盘')"
            >
                <yi-icon name="refresh" class-name="aicr-stat-icon quantum-stat-icon"></yi-icon>
                <span class="aicr-stat-value">{{ retrospectiveCount }}</span>
                <span class="aicr-stat-label">自改进</span>
            </button>
        </div>
    </div>

    <div v-if="!sessionLoading && sessions && sessions.length > 0" class="aicr-filter-bar" :class="{ 'is-collapsed': filterBarCollapsed }">
        <div class="aicr-filter-group">
            <span class="aicr-filter-label">故事 ({{ (subTags ? subTags.length : 0) + (subTagCounts && subTagCounts.noTagsCount > 0 ? 1 : 0) }})</span>
            <template v-if="subTags && subTags.length > 0">
                <button
                    v-if="subTagCounts && subTagCounts.noTagsCount > 0"
                    type="button"
                    class="aicr-filter-tag"
                    :class="{ active: storyLevelNoTags }"
                    @click="toggleStoryLevelNoTags"
                >没有故事 ({{ subTagCounts.noTagsCount }})</button>
                <button
                    v-for="tag in subTags"
                    :key="tag"
                    type="button"
                    class="aicr-filter-tag"
                    :class="{ active: selectedSessionTags && selectedSessionTags.includes(tag) }"
                    @click="toggleAicrTag(tag)"
                >{{ tag }} ({{ subTagCounts && subTagCounts.counts ? (subTagCounts.counts[tag] || 0) : 0 }})</button>
                <button
                    v-if="(selectedSessionTags && selectedSessionTags.length > 0) || tagFilterNoTags"
                    type="button"
                    class="aicr-filter-clear aicr-filter-clear--inline"
                    @click="clearAllTags"
                    title="清除故事筛选"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </template>
            <span v-else class="aicr-filter-empty">没有故事</span>
        </div>
        <div class="aicr-filter-group aicr-filter-group--type">
            <span class="aicr-filter-label">类型 ({{ typeTags ? typeTags.length : 0 }})</span>
            <template v-if="typeTags && typeTags.length > 0">
                <button
                    v-for="tt in typeTags"
                    :key="tt.type"
                    type="button"
                    class="aicr-filter-tag aicr-filter-tag--type"
                    :class="{ active: selectedTypeTags && selectedTypeTags.includes(tt.type) }"
                    @click="toggleTypeTag(tt.type)"
                >{{ tt.type }} ({{ tt.count }})</button>
                <button
                    v-if="selectedTypeTags && selectedTypeTags.length > 0"
                    type="button"
                    class="aicr-filter-clear aicr-filter-clear--inline"
                    @click="clearTypeTags"
                    title="清除类型筛选"
                >
                    <yi-icon name="close"></yi-icon>
                </button>
            </template>
            <span v-else class="aicr-filter-empty">没有类型</span>
        </div>
        <div class="aicr-filter-collapsed-row">
            <div class="aicr-filter-collapsed-scroll">
                <span v-if="!tagFilterNoTags && !storyLevelNoTags && (!selectedSessionTags || selectedSessionTags.length === 0) && (!selectedTypeTags || selectedTypeTags.length === 0)" class="aicr-filter-collapsed-empty">未选择筛选</span>
                <span v-if="tagFilterNoTags" class="aicr-filter-collapsed-pill">
                    没有标签
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleTagFilterNoTags" title="移除筛选">×</button>
                </span>
                <span v-if="storyLevelNoTags" class="aicr-filter-collapsed-pill">
                    没有故事
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleStoryLevelNoTags" title="移除筛选">×</button>
                </span>
                <span v-for="tag in (selectedSessionTags || [])" :key="tag" class="aicr-filter-collapsed-pill">
                    {{ tag }}
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleAicrTag(tag)" title="移除筛选">×</button>
                </span>
                <span v-for="type in (selectedTypeTags || [])" :key="type" class="aicr-filter-collapsed-pill aicr-filter-collapsed-pill--type">
                    {{ type }}
                    <button type="button" class="aicr-filter-collapsed-pill-close" @click.stop="toggleTypeTag(type)" title="移除筛选">×</button>
                </span>
            </div>
            <button
                v-if="sessionSearchQuery || (selectedSessionTags && selectedSessionTags.length > 0) || tagFilterNoTags || storyLevelNoTags || (selectedTypeTags && selectedTypeTags.length > 0)"
                type="button"
                class="aicr-filter-collapsed-clear"
                @click="clearAllAicrFilters"
                title="清除所有筛选"
            >
                <yi-icon name="close"></yi-icon>
            </button>
        </div>
    </div>

    <main class="aicr-main" :class="{ 'is-cards': viewMode === 'cards' }">
        <aicr-sidebar></aicr-sidebar>
        <aicr-code-area></aicr-code-area>
    </main>

    <!-- 键盘快捷键帮助面板 -->
    <keyboard-shortcuts-help
        :visible="showKeyboardShortcuts"
        @close="showKeyboardShortcuts = false"
    ></keyboard-shortcuts-help>
</div>
