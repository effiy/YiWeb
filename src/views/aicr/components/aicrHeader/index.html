<div class="aicr-header">
    <search-header
        v-model:search-query="searchQuery"
        placeholder="搜索网站、标签或描述..."
        home-href="/index.html"
        home-icon-class="globe"
        home-aria-label="打开首页"
        :show-aicr-button="false"
        :show-news-button="true"
        news-href="https://effiy.cn/src/views/news/index.html"
        news-button-title="新闻"
        :show-rss-manager-button="false"
        :show-sync-button="false"
        :sidebar-toggle-enabled="false"
        :sidebar-collapsed="sidebarCollapsed"
        :original-data="[]"
        :show-search="false"
        :show-clear-cache-button="true"
        @clear-cache="handleClearCache"
        @search-input="handleSearchInput"
        @search-keydown="handleMessageInput"
        @composition-start="handleCompositionStart"
        @composition-end="handleCompositionEnd"
        @clear-search="clearSearch"
    >
        <template
            v-if="allTags && (allTags.length > 0 || (tagCounts && tagCounts.noTagsCount > 0))">
            <div class="header-slot-content">
                <div class="tags-list">
                    <!-- 没有标签按钮（不允许拖拽） -->
                    <button
                        type="button"
                        v-if="tagCounts && tagCounts.noTagsCount > 0"
                        class="tag-item tag-no-tags"
                        :class="{ active: tagFilterNoTags }"
                        :draggable="false"
                        @click="toggleNoTags"
                        :title="tagFilterNoTags ? '取消筛选无标签文件' : '筛选没有标签的文件'">
                        没有标签 ({{ tagCounts.noTagsCount }})
                    </button>

                    <!-- 标签项（支持拖拽排序） -->
                    <button
                        type="button"
                        v-for="tag in visibleTags"
                        :key="tag"
                        class="tag-item"
                        :class="{ active: selectedTags && selectedTags.includes(tag) }"
                        :draggable="true"
                        :data-tag-name="tag"
                        @click="toggleTag(tag)"
                        @dragstart="handleDragStart($event, tag)"
                        @dragend="handleDragEnd($event)"
                        @dragover="handleDragOver($event)"
                        @dragleave="handleDragLeave($event)"
                        @drop="handleDrop($event, tag)"
                        :title="selectedTags && selectedTags.includes(tag) ? '取消选择 | 拖拽调整顺序' : '选择标签 | 拖拽调整顺序'">
                        {{ tag }} ({{ tagCounts && tagCounts.counts ? (tagCounts.counts[tag] || 0) : 0 }})
                    </button>

                </div>
            </div>
        </template>
    </search-header>
</div>
