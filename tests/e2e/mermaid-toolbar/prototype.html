<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid Toolbar Test</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
</head>
<body>
    <h1>Mermaid Toolbar Prototype Test</h1>

    <div id="markdown-content">
```mermaid
graph TD
    A[开始] --> B{判断}
    B -->|是| C[处理]
    B -->|否| D[结束]
    C --> D
```
    </div>

    <div id="rendered-output"></div>

    <script type="module">
        // Import markdown renderer
        import { renderMarkdownHtml } from '../../../../cdn/markdown/index.js';

        // Render markdown
        const markdown = document.getElementById('markdown-content').textContent;
        const output = document.getElementById('rendered-output');
        output.innerHTML = renderMarkdownHtml(markdown);

        console.log('[Test] Markdown rendered');
    </script>
</body>
</html>
