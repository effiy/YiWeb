<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YiWeb 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0F172A;
            color: #E2E8F0;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            min-height: 100vh;
        }
        .test-header {
            padding: 20px 24px;
            background: #1E293B;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .test-header h1 { font-size: 18px; font-weight: 700; }
        .test-header .status { font-size: 12px; color: #64748B; }
        #test-results { padding: 16px 24px; }
    </style>
</head>
<body>
    <div class="test-header">
        <h1>YiWeb 自主测试</h1>
        <span class="status" id="test-status">加载中...</span>
    </div>
    <div id="test-results"></div>

    <script type="module">
        import { run } from '/tests/runner.js';

        document.getElementById('test-status').textContent = '运行中...';

        // 加载所有测试模块
        const testModules = [
            import('/tests/fileTreeGraphData.test.js'),
            import('/tests/utils.test.js'),
            import('/tests/self-test-full.test.js'),
            import('/tests/self-test-incremental.test.js'),
            import('/tests/self-test-consistency.test.js'),
            import('/tests/self-test-security.test.js'),
        ];

        try {
            await Promise.all(testModules);
            const result = run('test-results');
            document.getElementById('test-status').textContent =
                result.failed ? `${result.failed} 失败` : '全部通过';
            if (result.failed) document.getElementById('test-status').style.color = '#ef4444';
            else document.getElementById('test-status').style.color = '#22c55e';
        } catch (e) {
            document.getElementById('test-results').innerHTML =
                `<pre style="color:#ef4444;padding:16px;">测试加载失败: ${e.message}\n${e.stack}</pre>`;
            document.getElementById('test-status').textContent = '加载失败';
            document.getElementById('test-status').style.color = '#ef4444';
        }
    </script>
</body>
</html>
